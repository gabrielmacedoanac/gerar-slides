<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANAC Slides - React + Tailwind</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap");

        :root {
            --background: #ffffff;
            --foreground: #09090b;
            --muted: #f4f4f5;
            --muted-foreground: #71717a;
            --popover: #ffffff;
            --popover-foreground: #09090b;
            --border: #e4e4e7;
            --input: #e4e4e7;
            --primary: #18181b;
            --primary-foreground: #fafafa;
            --secondary: #f4f4f5;
            --secondary-foreground: #18181b;
            --destructive: #ef4444;
            --destructive-foreground: #fafafa;
            --ring: #18181b;
            --radius: 0.5rem;
        }

        * {
            border-color: var(--border);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--foreground);
            margin: 0;
        }

        #editor {
            font-family: 'JetBrains Mono', monospace;
            resize: none;
            outline: none;
            width: 100%;
            height: 100%;
            padding: 1rem;
            font-size: 1rem;
            line-height: 1.6;
            border: none;
            box-sizing: border-box;
        }

        .toolbar-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.375rem;
            font-weight: 500;
            transition: background-color 0.2s;
            height: 2rem;
            width: 2rem;
            color: var(--foreground);
            background: transparent;
            border: none;
            cursor: pointer;
        }
        .toolbar-btn:hover {
            background-color: var(--muted);
        }
        .toolbar-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .toolbar-sep {
            width: 1px;
            height: 1.25rem;
            background-color: var(--border);
            margin: 0 0.25rem;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }
        .modal-content {
            background: var(--background);
            border-radius: var(--radius);
            padding: 1.5rem;
            width: 100%;
            max-width: 32rem;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
        }
        .form-control {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            font-size: 0.875rem;
            box-sizing: border-box;
        }
        .form-control:focus {
            outline: 2px solid var(--ring);
            outline-offset: 2px;
        }

        .tag-input-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem;
            align-items: center;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            background: #fff;
            min-height: 2.5rem;
            cursor: text;
            box-sizing: border-box;
        }
        .tag-input-container:focus-within {
            outline: 2px solid var(--ring);
            outline-offset: 2px;
        }
        .tag-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.15rem 0.5rem;
            background: #e8effa;
            color: #183859;
            border-radius: 999px;
            font-size: 0.8125rem;
            font-weight: 500;
            white-space: nowrap;
        }
        .tag-chip-remove {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1rem;
            height: 1rem;
            border: none;
            background: transparent;
            color: #183859;
            font-size: 1rem;
            line-height: 1;
            cursor: pointer;
            border-radius: 50%;
            padding: 0;
        }
        .tag-chip-remove:hover {
            background: rgba(24,56,89,0.15);
        }
        .tag-input-field {
            flex: 1;
            min-width: 100px;
            border: none;
            outline: none;
            font-size: 0.875rem;
            padding: 0.15rem 0;
            background: transparent;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: var(--popover);
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.1);
            z-index: 10;
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            padding: 0.25rem;
            margin-top: 0.25rem;
        }
        .dropdown-content.open {
            display: block;
        }
        .dropdown-item {
            color: var(--foreground);
            padding: 0.375rem 0.5rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            font-size: 0.875rem;
            border-radius: 0.25rem;
            cursor: pointer;
            gap: 0.5rem;
        }
        .dropdown-item:hover {
            background-color: var(--muted);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;

        // ---- Icons component ----
        function Icon({ name, className }) {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current) {
                    ref.current.innerHTML = '';
                    const el = document.createElement('i');
                    el.setAttribute('data-lucide', name);
                    if (className) el.className = className;
                    ref.current.appendChild(el);
                    lucide.createIcons();
                }
            }, [name, className]);
            return React.createElement('span', { ref });
        }

        function createIcon(name) {
            return React.createElement(Icon, { name });
        }

        function getContrastText(hex) {
            if (!hex) return '#ffffff';
            const c = hex.replace('#', '');
            const r = parseInt(c.substring(0,2), 16);
            const g = parseInt(c.substring(2,4), 16);
            const b = parseInt(c.substring(4,6), 16);
            const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
            return lum > 0.5 ? '#183859' : '#ffffff';
        }

        // ---- Image condensation ----
        const IMG_RE = /!\[([^\]]*)\]\((data:image\/[^;]+;base64,[^)]+)\)/g;
        const TOKEN_RE = /\[img:(\d+)\]/g;

        function getImageStore(imgRef) {
            if (!imgRef.current._map) imgRef.current._map = {};
            if (imgRef.current._nextId === undefined) imgRef.current._nextId = 0;
            return imgRef.current;
        }

        function condenseText(text, imgRef) {
            if (!text) return text;
            const store = getImageStore(imgRef);
            const map = store._map;
            return text.replace(IMG_RE, (match, alt, dataUrl) => {
                for (const k of Object.keys(map)) {
                    if (map[k].dataUrl === dataUrl) return `[img:${k}]`;
                }
                const id = store._nextId++;
                map[id] = { alt, dataUrl };
                return `[img:${id}]`;
            });
        }

        function expandText(text, imgRef) {
            if (!text) return text;
            const store = getImageStore(imgRef);
            const map = store._map;
            return text.replace(TOKEN_RE, (match, id) => {
                const entry = map[id];
                if (entry && entry.dataUrl) return `![${entry.alt}](${entry.dataUrl})`;
                return match;
            });
        }

        function getSlideWithExpanded(text, imgRef) {
            if (!text) return text;
            const store = getImageStore(imgRef);
            const map = store._map;
            let result = text;
            for (const id of Object.keys(map)) {
                const entry = map[id];
                if (entry && result.includes(`[img:${id}]`)) {
                    result = result.replaceAll(`[img:${id}]`, `![${entry.alt}](${entry.dataUrl})`);
                }
            }
            return result;
        }

        function slugify(text) {
            return (text || 'apresentacao')
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'apresentacao';
        }

        function getBase64Size(dataUrl) {
            const raw = dataUrl.split(',')[1] || '';
            return Math.round(raw.length * 0.75);
        }

        function readFileAsDataURL(file) {
            return new Promise((resolve) => {
                const r = new FileReader();
                r.onload = () => resolve(r.result);
                r.readAsDataURL(file);
            });
        }

    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"><\/script>
    <script>
        Reveal.initialize({
            hash: true, center: false, width: 1280, height: 720, margin: 0.04,
            slideNumber: 'c/t', controls: true, progress: true, touch: true
        });
        window.addEventListener("resize", function() { var a = Reveal.getCurrentSlide(); if(a) adj(); });
        function adj() {
            var cur = Reveal.getCurrentSlide();
            if (!cur) return;
            var con = cur.querySelector(".slide-content");
            if (!con) return;

            con.style.transform = "none";
            con.style.width = "";
            con.style.display = "";
            con.style.alignItems = "";
            con.style.justifyContent = "";

            var cols = con.querySelectorAll(".column, .column-large, .column-small");
            for (var i = 0; i < cols.length; i++) cols[i].style.fontSize = "";

            var imgs = con.querySelectorAll("img");
            for (var i = 0; i < imgs.length; i++) {
                imgs[i].style.maxHeight = "";
                imgs[i].style.maxWidth = "";
                imgs[i].style.width = "";
                imgs[i].style.height = "";
            }

            var pad = 60;
            var maxH = cur.offsetHeight - pad;
            var maxW = cur.offsetWidth - pad;

            if (cols.length > 0) {
                var parent = cols[0].parentElement;
                var availColH = parent.offsetHeight || maxH * 0.7;
                var maxColH = 0;
                for (var i = 0; i < cols.length; i++) {
                    var ch = cols[i].scrollHeight;
                    if (ch > maxColH) maxColH = ch;
                }
                if (maxColH > availColH) {
                    var pct = Math.max(40, Math.round((availColH / maxColH) * 100));
                    for (var i = 0; i < cols.length; i++) {
                        cols[i].style.fontSize = pct + "%";
                    }
                }
            }

            var hasOnlyImg = imgs.length > 0;
            if (hasOnlyImg) {
                var texts = [];
                var walk = function(el) {
                    for (var i = 0; i < el.childNodes.length; i++) {
                        var n = el.childNodes[i];
                        if (n.nodeType === 3 && n.textContent.trim()) texts.push(n.textContent);
                        else if (n.nodeType === 1 && n.tagName !== "IMG" && n.tagName !== "BR") walk(n);
                    }
                };
                walk(con);
                hasOnlyImg = texts.length === 0;
            }

            if (hasOnlyImg && imgs.length === 1) {
                con.style.display = "flex";
                con.style.alignItems = "center";
                con.style.justifyContent = "center";

                var img = imgs[0];
                var maxImgW = maxW * 0.92;
                var maxImgH = maxH * 0.92;
                img.style.maxWidth = "100%";
                img.style.maxHeight = "";
                img.style.width = "auto";
                img.style.height = "auto";
                img.onload = function() { setTimeout(adj, 100); };
                if (img.naturalWidth && img.naturalHeight) {
                    var ratio = img.naturalWidth / img.naturalHeight;
                    var fitW = Math.min(img.naturalWidth, maxImgW);
                    var fitH = fitW / ratio;
                    if (fitH > maxImgH) { fitH = maxImgH; fitW = fitH * ratio; }
                    img.style.width = fitW + "px";
                    img.style.height = fitH + "px";
                    img.style.maxWidth = "none";
                }
                return;
            }

            if (imgs.length > 0) {
                for (var i = 0; i < imgs.length; i++) {
                    var img = imgs[i];
                    img.style.maxWidth = "100%";
                    img.style.height = "auto";
                    if (img.naturalWidth) {
                        var iw = img.naturalWidth;
                        var ih = img.naturalHeight;
                        if (iw > maxW * 0.9) {
                            var s = (maxW * 0.9) / iw;
                            img.style.width = (iw * s) + "px";
                            img.style.height = (ih * s) + "px";
                        }
                    }
                }
            }

            var sx = 1, sy = 1;
            if (con.scrollWidth > maxW) sx = maxW / con.scrollWidth;
            if (con.scrollHeight > maxH) sy = maxH / con.scrollHeight;
            var s = Math.min(sx, sy, 1);
            if (s < 1) {
                con.style.transformOrigin = "${to} top";
                con.style.transform = "scale(" + s + ")";
                con.style.width = (maxW / s) + "px";
            }
        }
        Reveal.on("ready", adj); Reveal.on("slidechanged", adj);
    <\/script>

        function escHtml(str) {

        // ============ COMPONENTS ============

        const fileInputRef = React.createRef();

        function Toolbar() {
            const ctx = useContext(AppContext);
            const { insertMD, insertLayout, insertImages, editorRef } = ctx;

            function handleClick(item) {
                if (item.action === 'md') {
                    insertMD(item.before, item.after);
                } else if (item.action === 'layout') {
                    insertLayout(item.layout);
                } else if (item.action === 'image-upload') {
                    fileInputRef.current.click();
                }
            }

            function handleFileChange(e) {
                const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
                if (files.length > 0) insertImages(files);
                e.target.value = '';
            }

            return (
                <div className="flex items-center gap-0.5 overflow-x-auto border-b border-zinc-200 bg-zinc-50/50 px-2 py-1.5 shrink-0">
                    <input
                        ref={fileInputRef}
                        type="file"
                        accept="image/*"
                        multiple
                        style={{ display: 'none' }}
                        onChange={handleFileChange}
                    />
                    {TOOLBAR_ITEMS.map((item, i) => {
                        if (item.type === 'sep') {
                            return <div key={i} className="toolbar-sep"></div>;
                        }
                        return (
                            <React.Fragment key={i}>
                                <button
                                    className="toolbar-btn"
                                    onClick={() => handleClick(item)}
                                    title={item.title}

                                    <Icon name={item.icon} className="w-4 h-4" />

        function GalleryButton() {

                    <Icon name="images" className="w-4 h-4" />
                </button>
            );

        function Editor() {
            const ctx = useContext(AppContext);
            const { editMode, slides, currentIndex, setSlideContent, setSlidesFromFull, editorRef, insertImages, imageStoreRef } = ctx;
            const [dragOver, setDragOver] = useState(false);

            function getCondensed() {
                const raw = editMode === 'single'
                    ? (slides[currentIndex] || '')
                    : slides.join(SLIDE_SEP);
                return condenseText(raw, imageStoreRef);
            }

            function handleChange(e) {
                const raw = e.target.value;
                const full = expandText(raw, imageStoreRef);
                if (editMode === 'single') {
                    setSlideContent(full);
                } else {
                    const parts = full.split(/\n\n---\n\n|\n---\n/);
                    setSlidesFromFull(parts.map(p => p.trim()));
                }
            }

            function handleFocus(e) {
                if (editMode === 'single' && DEFAULT_SLIDES.includes(e.target.value)) {
                    e.target.select();
                }
            }

            function handleDragOver(e) {
                e.preventDefault();
                e.stopPropagation();
                setDragOver(true);
            }

            function handleDragLeave(e) {
                e.preventDefault();
                e.stopPropagation();
                setDragOver(false);
            }

            function handleDrop(e) {
                e.preventDefault();
                e.stopPropagation();
                setDragOver(false);
                const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
                if (files.length > 0) insertImages(files);
            }

            function handlePaste(e) {
                const items = Array.from(e.clipboardData.items).filter(i => i.type.startsWith('image/'));
                if (items.length > 0) {
                    e.preventDefault();
                    const files = items.map(i => i.getAsFile()).filter(Boolean);
                    if (files.length > 0) insertImages(files);
                }
            }

            return (
                <main
                    className={`flex-1 overflow-hidden relative ${dragOver ? 'ring-2 ring-blue-500 bg-blue-50/30' : ''}`}

                    onDragLeave={handleDragLeave}

                        id="editor"
                        ref={editorRef}
                        value={getCondensed()}

        function TagInput({ tags = [], onChange }) {
            const [input, setInput] = useState('');

            function addTag(value) {
                const items = value.split(',').map(s => s.trim()).filter(Boolean);
                if (items.length === 0) return;
                const set = new Set(tags);
                items.forEach(item => set.add(item));
                onChange([...set]);
                setInput('');
            }

            function removeTag(index) {
                const next = tags.filter((_, i) => i !== index);
                onChange(next);
            }

            function handleKey(e) {
                if (e.key === 'Enter' || e.key === ',') {
                    e.preventDefault();
                    addTag(input);
                }
                if (e.key === 'Backspace' && input === '' && tags.length > 0) {
                    removeTag(tags.length - 1);
                }
            }

            return (
                <div className="tag-input-container mt-1">
                    {(tags || []).map((tag, i) => (
                        <span key={i} className="tag-chip">
                            {tag}
                            <button type="button" className="tag-chip-remove" onClick={() => removeTag(i)}>&times;</button>
                        </span>
                    ))}
                    <input
                        type="text"
                        className="tag-input-field"
                        value={input}
                        onChange={e => setInput(e.target.value)}
                        onKeyDown={handleKey}
                        onBlur={() => addTag(input)}
                        placeholder={tags.length === 0 ? 'Digite o nome e Enter' : 'Adicionar...'}
                    />
                </div>
            );
        }

        // ============ Image Gallery Modal ============
        function ImageGalleryModal({ open, onClose }) {
            const { slides, currentIndex, setSlides, imageStoreRef } = useContext(AppContext);
            const fileRef = useRef(null);
            const [edits, setEdits] = useState({});
            const [expandedId, setExpandedId] = useState(null);
            const [bgMode, setBgMode] = useState({});
            const [align, setAlign] = useState({});
            const [imgWidth, setImgWidth] = useState({});

            if (!open) return null;

            const store = getImageStore(imageStoreRef);
            const map = store._map || {};
            const entries = Object.keys(map).map(id => ({ id, ...map[id] }));

            function applyToSlide(id, newMd) {
                const oldToken = `[img:${id}]`;
                const slideText = slides[currentIndex] || '';
                if (!slideText.includes(oldToken)) return;
                const updated = slideText.replace(oldToken, newMd);
                const next = [...slides];
                next[currentIndex] = updated;
                setSlides(next);
            }

            function revertTokens(text) {
                let result = text;
                for (const id of Object.keys(map)) {
                    result = result.replaceAll(`[img:${id}]`, `![${map[id].alt}](${map[id].dataUrl})`);
                }
                return result;
            }

            function saveEntry(id) {
                const ed = edits[id] || {};
                const entry = map[id];
                if (!entry) return;
                const newAlt = ed.alt !== undefined ? ed.alt : entry.alt;
                const newData = ed.dataUrl !== undefined ? ed.dataUrl : entry.dataUrl;
                const isBg = bgMode[id] || false;
                const a = align[id] || 'left';
                const w = imgWidth[id] || '';

                map[id] = { alt: newAlt, dataUrl: newData };

                let md;
                if (isBg) {
                    md = `<div class="slide-bg" style="background-image: url(${newData}); background-size: contain; background-position: center; min-height: 55vh; border-radius: 8px;"></div>`;
                } else {
                    const style = w ? ` style="max-width: ${w}"` : '';
                    const altAttr = newAlt.replace(/"/g, '&quot;');
                    if (a === 'center') {
                        md = `<div align="center"><img src="${newData}" alt="${altAttr}"${style} /></div>`;
                    } else if (a === 'right') {
                        md = `<div align="right"><img src="${newData}" alt="${altAttr}"${style} /></div>`;
                    } else {
                        md = w ? `<img src="${newData}" alt="${altAttr}"${style} />` : `![${newAlt}](${newData})`;
                    }
                }
                applyToSlide(id, md);
                setEdits(prev => { const n = { ...prev }; delete n[id]; return n; });
            }

            async function addFile(e) {
                const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
                e.target.value = '';
                if (files.length === 0) return;
                const storeData = getImageStore(imageStoreRef);
                let tokens = '';
                for (const file of files) {
                    const dataUrl = await readFileAsDataURL(file);
                    const alt = file.name.replace(/\.[^.]+$/, '');
                    const id = storeData._nextId++;
                    storeData._map[id] = { alt, dataUrl };
                    tokens += `[img:${id}]`;
                }
                const slideText = slides[currentIndex] || '';
                const next = [...slides];
                next[currentIndex] = slideText + (slideText ? '\n\n' : '') + tokens;
                setSlides(next);
            }

            function removeEntry(id) {
                const slideText = slides[currentIndex] || '';
                const updated = slideText.replace(`[img:${id}]`, '').replace(/\n{3,}/g, '\n\n').trim();
                delete map[id];
                const next = [...slides];
                next[currentIndex] = updated;
                setSlides(next);
                setEdits(prev => { const n = { ...prev }; delete n[id]; return n; });
            }

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content" onClick={e => e.stopPropagation()} style={{ maxWidth: '46rem', maxHeight: '90vh', overflow: 'auto' }}>
                        <div className="flex items-center justify-between mb-4">
                            <h2 className="text-xl font-semibold text-zinc-900">Imagens Incorporadas</h2>
                            <div className="flex items-center gap-2">
                                <button className="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium border border-zinc-200 rounded-md hover:bg-zinc-100"
                                    onClick={() => fileRef.current.click()}>
                                    <Icon name="plus" className="w-4 h-4" /> Adicionar
                                </button>
                                <input ref={fileRef} type="file" accept="image/*" multiple style={{ display: 'none' }} onChange={addFile} />
                                <button className="p-1 rounded hover:bg-zinc-100" onClick={onClose}>
                                    <Icon name="x" className="w-5 h-5" />
                                </button>
                            </div>
                        </div>

                        {entries.length === 0 && (
                            <p className="text-zinc-500 text-sm">Nenhuma imagem incorporada neste slide.</p>
                        )}

                        {entries.map(({ id, alt, dataUrl }) => {
                            const ed = edits[id] || {};
                            const curAlt = ed.alt !== undefined ? ed.alt : alt;
                            const curData = ed.dataUrl !== undefined ? ed.dataUrl : dataUrl;
                            const isBg = bgMode[id] || false;
                            const a = align[id] || 'left';
                            const w = imgWidth[id] || '';
                            const openRaw = expandedId === id;

                            return (
                                <div key={id} className="mb-4 border border-zinc-200 rounded-lg overflow-hidden">
                                    <div className="flex items-center gap-2 px-3 py-2 bg-zinc-50 border-b border-zinc-200 text-sm font-medium text-zinc-700">
                                        <Icon name="image" className="w-4 h-4 shrink-0" />
                                        <span className="truncate flex-1">{curAlt || 'sem nome'}</span>
                                        <span className="text-xs text-zinc-400">{getBase64Size(curData)} bytes</span>
                                    </div>

                                    <div className="p-3 flex justify-center bg-zinc-100/50">
                                        <img src={curData} alt={curAlt} className="max-h-32 rounded shadow-sm" />
                                    </div>

                                    <div className="p-3 space-y-2">
                                        <div>
                                            <label className="text-xs font-medium text-zinc-500">Texto alternativo (alt)</label>
                                            <input className="form-control text-sm mt-0.5" value={curAlt}
                                                onChange={e => setEdits(prev => ({ ...prev, [id]: { ...(prev[id] || {}), alt: e.target.value } }))} />
                                        </div>
                                        <div className="flex gap-2 items-end">
                                            <div className="flex-1">
                                                <label className="text-xs font-medium text-zinc-500">Alinhamento</label>
                                                <div className="flex gap-1 mt-0.5">
                                                    {['left', 'center', 'right'].map(p => (
                                                        <button key={p}
                                                            className={`px-2.5 py-1 text-xs rounded border ${a === p ? 'bg-blue-600 text-white border-blue-600' : 'border-zinc-200 hover:bg-zinc-50'}`}
                                                            onClick={() => setAlign(prev => ({ ...prev, [id]: p }))}>
                                                            {p === 'left' ? 'Esquerda' : p === 'center' ? 'Centro' : 'Direita'}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="w-28">
                                                <label className="text-xs font-medium text-zinc-500">Largura</label>
                                                <input className="form-control text-sm mt-0.5" placeholder="ex: 80%"
                                                    value={w} onChange={e => setImgWidth(prev => ({ ...prev, [id]: e.target.value }))} />
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <label className="flex items-center gap-1.5 text-sm cursor-pointer">
                                                <input type="checkbox" checked={isBg} onChange={e => setBgMode(prev => ({ ...prev, [id]: e.target.checked }))} />
                                                <span>Fundo do slide</span>
                                            </label>
                                        </div>
                                        <div>
                                            <button className="text-xs text-blue-600 hover:text-blue-800 flex items-center gap-1"
                                                onClick={() => setExpandedId(openRaw ? null : id)}>
                                                <Icon name={openRaw ? 'chevron-up' : 'chevron-down'} className="w-3 h-3" />
                                                {openRaw ? 'Ocultar' : 'Exibir'} base64
                                            </button>
                                            {openRaw && (
                                                <textarea className="form-control text-xs font-mono mt-1 h-20"
                                                    value={curData}
                                                    onChange={e => setEdits(prev => ({ ...prev, [id]: { ...(prev[id] || {}), dataUrl: e.target.value } }))} />
                                            )}
                                        </div>
                                    </div>

                                    <div className="flex justify-end gap-2 px-3 py-2 bg-zinc-50 border-t border-zinc-200">
                                        <button className="px-3 py-1.5 text-xs font-medium rounded border border-red-200 text-red-600 hover:bg-red-50"
                                            onClick={() => removeEntry(id)}>
                                            Remover
                                        </button>
                                        <button className="px-3 py-1.5 text-xs font-medium rounded bg-blue-600 text-white hover:bg-blue-700"
                                            onClick={() => saveEntry(id)}>
                                            Salvar
                                        </button>
                                    </div>
                                </div>
                            );
                        })}

                        <div className="flex justify-end mt-4">
                            <button className="px-4 py-2 rounded-md bg-zinc-100 text-sm font-medium hover:bg-zinc-200"
                                onClick={onClose}>Fechar</button>
                        </div>
                    </div>
                </div>
            );
        }

            const imageStoreRef = useRef({ _nextId: 0 });

            const insertMD = useCallback((before, after) => {
                const el = editorRef.current;
                if (!el) return;
                const start = el.selectionStart;
                const end = el.selectionEnd;
                const val = el.value;
                const sel = val.substring(start, end);
                const needsNewline = (before === '# ' || before === '- ') && start > 0 && val[start - 1] !== '\n';
                const prefix = needsNewline ? '\n' : '';
                const replacement = prefix + before + sel + after;

                document.execCommand('insertText', false, replacement);
                el.focus();
                if (sel.length === 0) {
                    const pos = start + prefix.length + before.length;
                    el.selectionStart = pos;
                    el.selectionEnd = pos;
                }
                el.dispatchEvent(new Event('input', { bubbles: true }));
            }, []);

            const insertLayout = useCallback((type) => {
                const layout = LAYOUTS[type];
                if (layout) insertMD(layout, '');
            }, [insertMD]);

            const setSlideContent = useCallback((value) => {
                setSlides(prev => {
                    const next = [...prev];
                    next[currentIndex] = value;
                    return next;
                });
            }, [currentIndex]);

            const setSlidesFromFull = useCallback((parts) => {
                setSlides(parts.length > 0 ? parts : ['']);
            }, []);

            const nextSlide = useCallback(() => {
                setCurrentIndex(i => Math.min(i + 1, slides.length - 1));
            }, [slides.length]);

            const prevSlide = useCallback(() => {
                setCurrentIndex(i => Math.max(i - 1, 0));
            }, []);

            const addSlide = useCallback(() => {
                setSlides(prev => {
                    const next = [...prev];
                    next.splice(currentIndex + 1, 0, "## Novo Slide\n\nAdicione conteudo");
                    return next;
                });
                setCurrentIndex(i => i + 1);
            }, [currentIndex]);

            const deleteSlide = useCallback(() => {
                if (slides.length <= 1) return;
                setSlides(prev => {
                    const next = [...prev];
                    next.splice(currentIndex, 1);
                    return next;
                });
                setCurrentIndex(i => Math.min(i, slides.length - 2));
            }, [slides.length, currentIndex]);

            const previewSlides = useCallback(() => {
                const w = window.open();
                w.document.write(generateRevealHTML(slides, config, theme, imageStoreRef));
                w.document.close();
            }, [slides, config, theme]);

            const getSlug = useCallback(() => slugify(config.title), [config.title]);

            const downloadHTML = useCallback(() => {
                const blob = new Blob([generateRevealHTML(slides, config, theme, imageStoreRef)], { type: 'text/html' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `${getSlug()}.html`;
                a.click();
            }, [slides, config, theme, getSlug]);

            const downloadPDF = useCallback(() => {
                let html = generateRevealHTML(slides, config, theme, imageStoreRef)
                    .replace('</head>', '<style>@media print { .reveal .slides { height: auto !important; } }</style></head>');
                const w = window.open('', '_blank');
                w.document.write(html);
                w.document.close();
                setTimeout(() => { w.print(); }, 1000);
            }, [slides, config, theme]);

            const downloadMD = useCallback(() => {
                const authors = Array.isArray(config.author) && config.author.length > 0
                    ? config.author.map(a => `  - "${a.trim()}"`).join('\n') : '';
                let frontMatter = '---\n';
                if (config.title) frontMatter += `title: "${config.title}"\n`;
                if (config.subtitle) frontMatter += `subtitle: "${config.subtitle}"\n`;
                if (authors) frontMatter += `author:\n${authors}\n`;
                if (config.date) frontMatter += `date: "${config.date}"\n`;
                frontMatter += `theme: "${theme}"\n`;
                frontMatter += '---\n\n';
                let md = slides.map((s) => {
                    const expanded = imageStoreRef ? getSlideWithExpanded(s, imageStoreRef) : s;
                    return expanded;
                }).join('\n\n---\n\n');
                const blob = new Blob([frontMatter + md], { type: 'text/markdown' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `${getSlug()}.md`;
                a.click();
            }, [slides, config, theme, getSlug]);

            const openConfig = useCallback(() => setConfigOpen(true), []);
            const closeConfig = useCallback(() => setConfigOpen(false), []);

            const insertImage = useCallback((file) => {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const alt = file.name.replace(/\.[^.]+$/, '');
                    const dataUrl = e.target.result;
                    const store = getImageStore(imageStoreRef);
                    const id = store._nextId++;
                    store._map[id] = { alt, dataUrl };
                    const token = `[img:${id}]`;
                    const el = editorRef.current;
                    if (el) {
                        el.focus();
                        document.execCommand('insertText', false, token);
                        el.dispatchEvent(new Event('input', { bubbles: true }));
                    }
                };
                reader.readAsDataURL(file);
            }, []);

            const insertImages = useCallback(async (files) => {
                const store = getImageStore(imageStoreRef);
                let tokens = '';
                const el = editorRef.current;
                for (const file of files) {
                    if (!file.type.startsWith('image/')) continue;
                    const dataUrl = await readFileAsDataURL(file);
                    const alt = file.name.replace(/\.[^.]+$/, '');
                    const id = store._nextId++;
                    store._map[id] = { alt, dataUrl };
                    tokens += `[img:${id}]`;
                }
                if (el && tokens) {
                    el.focus();
                    document.execCommand('insertText', false, tokens);
                    el.dispatchEvent(new Event('input', { bubbles: true }));
                }
            }, []);

            const ctxValue = {
                slides, setSlides, currentIndex, setSlideContent, setSlidesFromFull,
                editMode, setEditMode, theme, setTheme,
                config, setConfig, configOpen, openConfig, closeConfig,
                editorRef, insertMD, insertLayout, insertImage, insertImages,
                nextSlide, prevSlide, addSlide, deleteSlide,
                previewSlides, downloadHTML, downloadPDF, downloadMD,
                imageStoreRef, galleryOpen, setGalleryOpen
            };

            return (
                <AppContext.Provider value={ctxValue}>
                    <div className="h-screen flex flex-col overflow-hidden">
                        <Header />
                        <Toolbar />
                        <Editor />
                        <Footer />
                        <ConfigModal />
                        <ImageGalleryModal
                            open={galleryOpen}
                            onClose={() => setGalleryOpen(false)}
                        />
                    </div>
                </AppContext.Provider>
            );
        }

        // ---- Mount ----
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
