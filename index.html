                                <a className="dropdown-item" onClick={() => { copyToClipboard(); setExportOpen(false); }}>
                                    <Icon name="copy" className="w-4 h-4" /> Copiar para Área de Transferência
                                </a>
                                <a className="dropdown-item" onClick={() => { downloadTXT(); setExportOpen(false); }}>
                                    <Icon name="file" className="w-4 h-4" /> Exportar TXT (Para Importação)
                                </a>
                                <a className="dropdown-item" onClick={() => { downloadCSV(); setExportOpen(false); }}>
                                    <Icon name="table" className="w-4 h-4" /> Exportar CSV
                                </a>
                                <a className="dropdown-item" onClick={() => { downloadTSV(); setExportOpen(false); }}>
                                    <Icon name="table" className="w-4 h-4" /> Exportar TSV
                                </a>

                            </div>

                        </div>



                        {/* Import Dropdown */}

                        <div className="relative" ref={importRef}>

                            <button

                                className="flex items-center justify-center w-8 h-8 rounded-md hover:bg-zinc-100 text-zinc-700"

                                onClick={() => { setImportOpen(!importOpen); setThemeOpen(false); setExportOpen(false); }}

                                title="Importar"

                            >

                                <Icon name="upload" className="w-4 h-4" />

                            </button>

                            <div className={`dropdown-content ${importOpen ? 'open' : ''}`}>

                                <a className="dropdown-item" onClick={() => { importFileRef.current.accept = '.md'; importFileRef.current.click(); setImportOpen(false); }}>

                                    <Icon name="file-text" className="w-4 h-4" /> Importar MD (Markdown)

                                </a>

                            </div>

                        </div>

                        <input

                            ref={importFileRef}

                            type="file"

                            accept=".md,.html"

                            style={{ display: 'none' }}

                            onChange={e => {

                                const file = e.target.files && e.target.files[0];

                                if (!file) return;

                                const reader = new FileReader();

                                reader.onload = function (ev) {

                                    let text = ev.target.result;
                                    parseAndLoadPresentation(text);
                                };

                                reader.readAsText(file);

                                e.target.value = '';

                            }}

                        />

                    </div>

                </header>

            );

        }



        const fileInputRef = React.createRef();



        function Toolbar() {

            const ctx = useContext(AppContext);

            const { insertMD, insertLayout, insertImages, editorRef, setChartOpen } = ctx;



            function handleClick(item) {

                if (item.action === 'md') {

                    insertMD(item.before, item.after);

                } else if (item.action === 'layout') {

                    insertLayout(item.layout);

                } else if (item.action === 'image-upload') {

                    fileInputRef.current.click();

                } else if (item.action === 'chart') {
                    setChartOpen(true);
                } else if (item.action === 'history') {
                    if (editorRef.current) {
                        editorRef.current.focus();
                        document.execCommand(item.historyAction);
                    }
                }
            }



            function handleFileChange(e) {

                const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));

                if (files.length > 0) insertImages(files);

                e.target.value = '';

            }



            return (

                <div className="flex items-center gap-0.5 overflow-x-auto border-b border-zinc-200 bg-zinc-50/50 px-2 py-1.5 shrink-0">

                    <input

                        ref={fileInputRef}

                        type="file"

                        accept="image/*"

                        multiple

                        style={{ display: 'none' }}

                        onChange={handleFileChange}

                    />

                    {TOOLBAR_ITEMS.map((item, i) => {

                        if (item.type === 'sep') {

                            return <div key={i} className="toolbar-sep"></div>;

                        }

                        return (

                            <React.Fragment key={i}>

                                <button

                                    className="toolbar-btn"

                                    onClick={() => handleClick(item)}

                                    title={item.title}

                                >

                                    <Icon name={item.icon} className="w-4 h-4" />

                                </button>

                                {item.action === 'image-upload' && <GalleryButton />}

                            </React.Fragment>

                        );

                    })}

                </div>

            );

        }



        function GalleryButton() {

            const { setGalleryOpen } = useContext(AppContext);

            return (

                <button className="toolbar-btn" onClick={() => setGalleryOpen(true)} title="Imagens incorporadas">

                    <Icon name="images" className="w-4 h-4" />

                </button>

            );

        }



        function Editor() {

            const ctx = useContext(AppContext);

            const { editMode, slides, currentIndex, setSlideContent, setSlidesFromFull, parseAndLoadPresentation, editorRef, insertImages, imageStoreRef } = ctx;

            const [dragOver, setDragOver] = useState(false);



            function getCondensed() {

                const raw = editMode === 'single'

                    ? (slides[currentIndex] || '')

                    : slides.join(SLIDE_SEP);

                return condenseText(raw, imageStoreRef);

            }



            function handleChange(e) {

                const raw = e.target.value;

                const full = expandText(raw, imageStoreRef);

                if (editMode === 'single') {

                    setSlideContent(full);

                } else {

                    const parts = full.split(/\n\n---\n\n|\n---\n/);

                    setSlidesFromFull(parts.map(p => p.trim()));

                }

            }



            const NEW_SLIDE_PLACEHOLDER_TEXT = "## Novo Slide\n\nAdicione seu conteúdo aqui.";

            function handleFocus(e) {

                if (editMode === 'single' && (

                    DEFAULT_SLIDES.includes(e.target.value) ||

                    e.target.value === NEW_SLIDE_PLACEHOLDER_TEXT

                )) {

                    e.target.select();

                }

            }



            function handleDragOver(e) {

                e.preventDefault();

                e.stopPropagation();

                setDragOver(true);

            }



            function handleDragLeave(e) {

                e.preventDefault();

                e.stopPropagation();

                setDragOver(false);

            }



            function handleDrop(e) {

                e.preventDefault();

                e.stopPropagation();

                setDragOver(false);

                const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));

                if (files.length > 0) insertImages(files);

            }



            function handlePaste(e) {

                const items = Array.from(e.clipboardData.items).filter(i => i.type.startsWith('image/'));

                if (items.length > 0) {

                    e.preventDefault();

                    const files = items.map(i => i.getAsFile()).filter(Boolean);

                    if (files.length > 0) insertImages(files);

                    return;

                }

                if (e.shiftKey) return;

                const plainText = e.clipboardData.getData('text/plain');

                if (plainText) {
                    const frontmatterRegex = /^---\n([\s\S]*?)\n---\n/;
                    if (frontmatterRegex.test(plainText) && plainText.includes('\n\n---\n\n')) {
                        e.preventDefault();
                        if (confirm('O conteúdo colado parece ser uma apresentação completa. Deseja substituir a apresentação atual?')) {
                            parseAndLoadPresentation(plainText);
                        }
                        return;
                    }
                }

                const currentText = getCondensed();

                if (plainText && plainText.includes('\t') && plainText.split('\n').filter(l => l.trim()).length >= 2) {

                    e.preventDefault();

                    const mdTable = excelToMarkdown(plainText);

                    if (mdTable) {

                        const el = editorRef.current;

                        if (el) {

                            el.focus();

                            document.execCommand('insertText', false, '\n\n' + mdTable + '\n');

                            el.dispatchEvent(new Event('input', { bubbles: true }));

                        }

                        showToast('Tabela convertida do Excel');

                    }

                }

            }



            const currentText = getCondensed();

            const isEmpty = !currentText.trim();



            return (

                <main

                    className={`flex-1 overflow-hidden relative ${dragOver ? 'ring-2 ring-blue-500 bg-blue-50/30' : ''}`}

                    onDragOver={handleDragOver}

                    onDragLeave={handleDragLeave}

                    onDrop={handleDrop}

                >

                    <textarea

                        id="editor"

                        ref={editorRef}

                        value={currentText}

                        onChange={handleChange}

                        onFocus={handleFocus}

                        onPaste={handlePaste}

                        placeholder=""

                    />

                    {isEmpty && (

                        <div className="editor-hint">

                            <div className="editor-hint-line"><span className="eh-label">#</span> Título</div>

                            <div className="editor-hint-line"><span className="eh-label">##</span> Subtítulo</div>

                            <div className="editor-hint-line eh-gap"></div>

                            <div className="editor-hint-line"><span className="eh-syntax">**negrito**</span> <span className="eh-syntax">__sublinhado__</span> <span className="eh-syntax">~~tachado~~</span> <span className="eh-syntax">==destaque==</span></div>

                            <div className="editor-hint-line"><span className="eh-syntax">`código`</span></div>

                            <div className="editor-hint-line"><span className="eh-syntax">- item de lista</span></div>

                            <div className="editor-hint-line"><span className="eh-syntax">&gt; citação</span></div>

                            <div className="editor-hint-line"><span className="eh-syntax">[link](url)</span> <span className="eh-syntax">![imagem](url)</span></div>

                            <div className="editor-hint-line eh-gap"></div>

                            <div className="editor-hint-line eh-note">Arraste e solte imagens diretamente no editor.</div>

                            <div className="editor-hint-line eh-note">Use os botões de layout para dividir o slide em colunas.</div>

                        </div>

                    )}

                    {dragOver && (

                        <div className="absolute inset-0 flex items-center justify-center pointer-events-none">

                            <div className="bg-white/90 rounded-lg px-6 py-4 shadow-lg border-2 border-dashed border-blue-400 text-blue-600 font-medium text-lg">

                                Solte as imagens para inserir

                            </div>

                        </div>

                    )}

                </main>

            );

        }



        function Footer() {

            const ctx = useContext(AppContext);

            const { editMode, setEditMode, slides, currentIndex, nextSlide, prevSlide, addSlide, deleteSlide } = ctx;



            return (

                <footer className="flex items-center justify-between border-t border-zinc-200 bg-white px-4 py-2 shrink-0">

                    <div className="flex items-center gap-2">

                        <button

                            className="flex items-center gap-2 px-3 py-1.5 text-xs font-medium rounded-md bg-zinc-100 hover:bg-zinc-200 text-zinc-800"

                            onClick={() => setEditMode(editMode === 'single' ? 'full' : 'single')}

                        >

                            <Icon name={editMode === 'single' ? 'split-square-horizontal' : 'layers'} className="w-4 h-4" />

                            <span>{editMode === 'single' ? 'Modo: Slide Unico' : 'Modo: Todos os Slides'}</span>

                        </button>

                        <div className="toolbar-sep mx-2"></div>

                        {editMode === 'single' && (

                            <div className="flex items-center gap-1">

                                <button className="toolbar-btn" onClick={prevSlide} disabled={currentIndex === 0}>

                                    <Icon name="chevron-left" className="w-4 h-4" />

                                </button>

                                <button className="toolbar-btn" onClick={nextSlide} disabled={currentIndex === slides.length - 1}>

                                    <Icon name="chevron-right" className="w-4 h-4" />

                                </button>

                            </div>

                        )}

                    </div>

                    {editMode === 'single' && (

                        <div className="flex items-center gap-2">

                            <button

                                className="toolbar-btn text-red-600 hover:bg-red-50"

                                onClick={deleteSlide}

                                disabled={slides.length <= 1}

                                title="Excluir Slide"

                            >

                                <Icon name="trash-2" className="w-4 h-4" />

                            </button>

                            <button

                                className="toolbar-btn text-blue-600 hover:bg-blue-50"

                                onClick={addSlide}

                                title="Novo Slide"

                            >

                                <Icon name="plus" className="w-4 h-4" />

                            </button>

                        </div>

                    )}

                </footer>

            );

        }



        function TagInput({ tags = [], onChange }) {

            const [input, setInput] = useState('');



            function addTag(value) {

                const items = value.split(',').map(s => s.trim()).filter(Boolean);

                if (items.length === 0) return;

                const set = new Set(tags);

                items.forEach(item => set.add(item));

                onChange([...set]);

                setInput('');

            }



            function removeTag(index) {

                const next = tags.filter((_, i) => i !== index);

                onChange(next);

            }



            function handleKey(e) {

                if (e.key === 'Enter' || e.key === ',') {

                    e.preventDefault();

                    addTag(input);

                }

                if (e.key === 'Backspace' && input === '' && tags.length > 0) {

                    removeTag(tags.length - 1);

                }

            }



            return (

                <div className="tag-input-container mt-1">

                    {(tags || []).map((tag, i) => (

                        <span key={i} className="tag-chip">

                            {tag}

                            <button type="button" className="tag-chip-remove" onClick={() => removeTag(i)}>&times;</button>

                        </span>

                    ))}

                    <input

                        type="text"

                        className="tag-input-field"

                        value={input}

                        onChange={e => setInput(e.target.value)}

                        onKeyDown={handleKey}

                        onBlur={() => addTag(input)}

                        placeholder={tags.length === 0 ? 'Digite o nome e Enter' : 'Adicionar...'}

                    />

                </div>

            );

        }



        function ConfigModal() {

            const ctx = useContext(AppContext);

            const { config, setConfig, configOpen, closeConfig } = ctx;



            if (!configOpen) return null;



            function update(field, value) {

                setConfig(prev => ({ ...prev, [field]: value }));

            }



            return (

                <div className="modal-overlay" onClick={closeConfig}>

                    <div className="modal-content" onClick={e => e.stopPropagation()}>

                        <div className="flex items-center justify-between mb-5">

                            <h2 className="text-xl font-semibold text-zinc-900 flex items-center gap-2">

                                <Icon name="settings" className="w-5 h-5 text-blue-600" />

                                Metadados da Apresentação

                            </h2>

                            <button className="p-1.5 rounded-md hover:bg-zinc-100 text-zinc-500" onClick={closeConfig}>

                                <Icon name="x" className="w-5 h-5" />

                            </button>

                        </div>

                        <div className="space-y-4">

                            <div>

                                <label className="text-sm font-medium text-zinc-700">Título</label>

                                <input type="text" className="form-control mt-1" value={config.title}

                                    onChange={e => update('title', e.target.value)} placeholder="Digite o titulo" />

                            </div>

                            <div>

                                <label className="text-sm font-medium text-zinc-700">Subtítulo</label>

                                <input type="text" className="form-control mt-1" value={config.subtitle}

                                    onChange={e => update('subtitle', e.target.value)} placeholder="Digite o subtitulo" />

                            </div>

                            <div>

                                <label className="text-sm font-medium text-zinc-700">Autores</label>

                                <TagInput tags={config.author} onChange={v => update('author', v)} />

                            </div>

                            <div>

                                <label className="text-sm font-medium text-zinc-700">Data</label>

                                <input type="date" className="form-control mt-1" value={config.date}

                                    onChange={e => update('date', e.target.value)} />

                            </div>

                            <label className="flex items-center gap-2.5 py-2 px-3 rounded-lg border border-zinc-200 cursor-pointer hover:bg-zinc-50 select-none">

                                <input type="checkbox" checked={config.center}

                                    onChange={e => update('center', e.target.checked)} className="w-4 h-4 rounded border-zinc-300 text-blue-600 focus:ring-blue-500" />

                                <span className="text-sm font-medium text-zinc-700">Centralizar conteúdo dos slides</span>

                            </label>

                        </div>

                        <div className="flex justify-end gap-2 mt-6 pt-4 border-t border-zinc-100">

                            <button className="px-4 py-2 rounded-lg border border-zinc-200 text-sm font-medium text-zinc-600 hover:bg-zinc-50"

                                onClick={closeConfig}>Cancelar</button>

                            <button className="px-5 py-2 rounded-lg bg-blue-600 text-white text-sm font-medium hover:bg-blue-700"

                                onClick={closeConfig}>Salvar</button>

                        </div>

                    </div>

                </div>

            );

        }



        // ============ Image Gallery Modal ============

        function ImageGalleryModal({ open, onClose }) {

            const { slides, currentIndex, setSlides, imageStoreRef } = useContext(AppContext);

            const fileRef = useRef(null);

            const [edits, setEdits] = useState({});

            const [expandedId, setExpandedId] = useState(null);

            const [bgMode, setBgMode] = useState({});

            const [align, setAlign] = useState({});

            const [imgWidth, setImgWidth] = useState({});

            const [imagensPorSlide, setImagensPorSlide] = useState(1);



            if (!open) return null;



            const store = getImageStore(imageStoreRef);

            const map = store._map || {};

            const entries = Object.keys(map).map(id => ({ id, ...map[id] }));



            function applyToSlide(id, newMd) {

                const oldToken = `[img:${id}]`;

                const slideText = slides[currentIndex] || '';

                if (!slideText.includes(oldToken)) return;

                const updated = slideText.replace(oldToken, newMd);

                const next = [...slides];

                next[currentIndex] = updated;

                setSlides(next);

            }



            function revertTokens(text) {

                let result = text;

                for (const id of Object.keys(map)) {

                    result = result.replaceAll(`[img:${id}]`, `![${map[id].alt}](${map[id].dataUrl})`);

                }

                return result;

            }



            function saveEntry(id) {

                const ed = edits[id] || {};

                const entry = map[id];

                if (!entry) return;

                const newAlt = ed.alt !== undefined ? ed.alt : entry.alt;

                const newData = ed.dataUrl !== undefined ? ed.dataUrl : entry.dataUrl;

                const isBg = bgMode[id] || false;

                const a = align[id] || 'left';

                const w = imgWidth[id] || '';



                map[id] = { alt: newAlt, dataUrl: newData };



                let md;

                if (isBg) {

                    md = `<div class="slide-bg" style="background-image: url(${newData}); background-size: contain; background-position: center; min-height: 55vh; border-radius: 8px;"></div>`;

                } else {

                    const style = w ? ` style="max-width: ${w}"` : '';

                    const altAttr = newAlt.replace(/"/g, '&quot;');

                    if (a === 'center') {

                        md = `<div align="center"><img src="${newData}" alt="${altAttr}"${style} /></div>`;

                    } else if (a === 'right') {

                        md = `<div align="right"><img src="${newData}" alt="${altAttr}"${style} /></div>`;

                    } else {

                        md = w ? `<img src="${newData}" alt="${altAttr}"${style} />` : `![${newAlt}](${newData})`;

                    }

                }

                applyToSlide(id, md);

                setEdits(prev => { const n = { ...prev }; delete n[id]; return n; });

            }



            async function addFile(e) {

                const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));

                e.target.value = '';

                if (files.length === 0) return;

                const storeData = getImageStore(imageStoreRef);

                const allTokens = [];

                for (const file of files) {

                    const dataUrl = await readFileAsDataURL(file);

                    const alt = file.name.replace(/\.[^.]+$/, '');

                    const id = storeData._nextId++;

                    storeData._map[id] = { alt, dataUrl };

                    allTokens.push(`[img:${id}]`);

                }

                const perSlide = imagensPorSlide;

                const chunks = [];

                for (let i = 0; i < allTokens.length; i += perSlide) {

                    chunks.push(allTokens.slice(i, i + perSlide).join('\n\n'));

                }

                const next = [...slides];

                const insertPos = currentIndex + 1;

                for (let i = chunks.length - 1; i >= 0; i--) {

                    next.splice(insertPos, 0, chunks[i]);

                }

                setSlides(next);

            }



            function removeEntry(id) {

                const slideText = slides[currentIndex] || '';

                const updated = slideText.replace(`[img:${id}]`, '').replace(/\n{3,}/g, '\n\n').trim();

                delete map[id];

                const next = [...slides];

                next[currentIndex] = updated;

                setSlides(next);

                setEdits(prev => { const n = { ...prev }; delete n[id]; return n; });

            }



            return (

                <div className="modal-overlay" onClick={onClose}>

                    <div className="modal-content" onClick={e => e.stopPropagation()} style={{ maxWidth: '46rem', maxHeight: '90vh', overflow: 'auto' }}>

                        <div className="flex items-center justify-between mb-4">

                            <h2 className="text-xl font-semibold text-zinc-900">Imagens Incorporadas</h2>

                            <div className="flex items-center gap-2">

                                <div className="flex items-center gap-1">

                                    <button className="w-6 h-6 flex items-center justify-center rounded border text-sm hover:bg-zinc-100"

                                        onClick={() => setImagensPorSlide(Math.max(1, imagensPorSlide - 1))}>−</button>

                                    <span className="text-sm font-medium w-5 text-center">{imagensPorSlide}</span>

                                    <button className="w-6 h-6 flex items-center justify-center rounded border text-sm hover:bg-zinc-100"

                                        onClick={() => setImagensPorSlide(imagensPorSlide + 1)}>+</button>

                                </div>

                                <button className="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium border border-zinc-200 rounded-md hover:bg-zinc-100"

                                    onClick={() => fileRef.current.click()}>

                                    <Icon name="plus" className="w-4 h-4" /> Adicionar em novo slide

                                </button>

                                <input ref={fileRef} type="file" accept="image/*" multiple style={{ display: 'none' }} onChange={addFile} />

                                <button className="p-1 rounded hover:bg-zinc-100" onClick={onClose}>

                                    <Icon name="x" className="w-5 h-5" />

                                </button>

                            </div>

                        </div>



                        {entries.length === 0 && (

                            <p className="text-zinc-500 text-sm">Nenhuma imagem incorporada neste slide.</p>

                        )}



                        {entries.map(({ id, alt, dataUrl }) => {

                            const ed = edits[id] || {};

                            const curAlt = ed.alt !== undefined ? ed.alt : alt;

                            const curData = ed.dataUrl !== undefined ? ed.dataUrl : dataUrl;

                            const isBg = bgMode[id] || false;

                            const a = align[id] || 'left';

                            const w = imgWidth[id] || '';

                            const openRaw = expandedId === id;



                            return (

                                <div key={id} className="mb-4 border border-zinc-200 rounded-lg overflow-hidden">

                                    <div className="flex items-center gap-2 px-3 py-2 bg-zinc-50 border-b border-zinc-200 text-sm font-medium text-zinc-700">

                                        <Icon name="image" className="w-4 h-4 shrink-0" />

                                        <span className="truncate flex-1">{curAlt || 'sem nome'}</span>

                                        <span className="text-xs text-zinc-400">{getBase64Size(curData)} bytes</span>

                                    </div>



                                    <div className="p-3 flex justify-center bg-zinc-100/50">

                                        <img src={curData} alt={curAlt} className="max-h-32 rounded shadow-sm" />

                                    </div>



                                    <div className="p-3 space-y-2">

                                        <div>

                                            <label className="text-xs font-medium text-zinc-500">Texto alternativo (alt)</label>

                                            <input className="form-control text-sm mt-0.5" value={curAlt}

                                                onChange={e => setEdits(prev => ({ ...prev, [id]: { ...(prev[id] || {}), alt: e.target.value } }))} />

                                        </div>

                                        <div className="flex gap-2 items-end">

                                            <div className="flex-1">

                                                <label className="text-xs font-medium text-zinc-500">Alinhamento</label>

                                                <div className="flex gap-1 mt-0.5">

                                                    {['left', 'center', 'right'].map(p => (

                                                        <button key={p}

                                                            className={`px-2.5 py-1 text-xs rounded border ${a === p ? 'bg-blue-600 text-white border-blue-600' : 'border-zinc-200 hover:bg-zinc-50'}`}

                                                            onClick={() => setAlign(prev => ({ ...prev, [id]: p }))}>

                                                            {p === 'left' ? 'Esquerda' : p === 'center' ? 'Centro' : 'Direita'}

                                                        </button>

                                                    ))}

                                                </div>

                                            </div>

                                            <div className="w-28">

                                                <label className="text-xs font-medium text-zinc-500">Largura</label>

                                                <input className="form-control text-sm mt-0.5" placeholder="ex: 80%"

                                                    value={w} onChange={e => setImgWidth(prev => ({ ...prev, [id]: e.target.value }))} />

                                            </div>

                                        </div>

                                        <div className="flex items-center gap-2">

                                            <label className="flex items-center gap-1.5 text-sm cursor-pointer">

                                                <input type="checkbox" checked={isBg} onChange={e => setBgMode(prev => ({ ...prev, [id]: e.target.checked }))} />

                                                <span>Fundo do slide</span>

                                            </label>

                                        </div>

                                        <div>

                                            <button className="text-xs text-blue-600 hover:text-blue-800 flex items-center gap-1"

                                                onClick={() => setExpandedId(openRaw ? null : id)}>

                                                <Icon name={openRaw ? 'chevron-up' : 'chevron-down'} className="w-3 h-3" />

                                                {openRaw ? 'Ocultar' : 'Exibir'} base64

                                            </button>

                                            {openRaw && (

                                                <textarea className="form-control text-xs font-mono mt-1 h-20"

                                                    value={curData}

                                                    onChange={e => setEdits(prev => ({ ...prev, [id]: { ...(prev[id] || {}), dataUrl: e.target.value } }))} />

                                            )}

                                        </div>

                                    </div>



                                    <div className="flex justify-end gap-2 px-3 py-2 bg-zinc-50 border-t border-zinc-200">

                                        <button className="px-3 py-1.5 text-xs font-medium rounded border border-red-200 text-red-600 hover:bg-red-50"

                                            onClick={() => removeEntry(id)}>

                                            Remover

                                        </button>

                                        <button className="px-3 py-1.5 text-xs font-medium rounded bg-blue-600 text-white hover:bg-blue-700"

                                            onClick={() => saveEntry(id)}>

                                            Salvar

                                        </button>

                                    </div>

                                </div>

                            );

                        })}



                        <div className="flex justify-end mt-4">

                            <button className="px-4 py-2 rounded-md bg-zinc-100 text-sm font-medium hover:bg-zinc-200"

                                onClick={onClose}>Fechar</button>

                        </div>

                    </div>

                </div>

            );

        }



        // ============ CHART MODAL ============

        function ChartModal({ open, onClose }) {

            const { editorRef, setSlideContent, slides, currentIndex } = useContext(AppContext);



            // ---- Example presets ----

            const PRESETS = [

                {

                    label: '📊 Barras',

                    type: 'bar',

                    title: 'Comparativo por Categoria',

                    data: '| Categoria | 2022 | 2023 | 2024 |\n|-----------|------|------|------|\n| Alpha     | 120  | 150  | 180  |\n| Beta      | 80   | 110  | 140  |\n| Gamma     | 200  | 170  | 220  |',

                    dataSource: 'markdown',

                },

                {

                    label: '📈 Linhas',

                    type: 'line',

                    title: 'Evolução Anual',

                    data: '| Ano  | Resultado A | Resultado B |\n|------|------------|-------------|\n| 2020 | 45         | 30          |\n| 2021 | 60         | 50          |\n| 2022 | 75         | 65          |\n| 2023 | 90         | 80          |',

                    dataSource: 'markdown',

                },

                {

                    label: '🥧 Pizza',

                    type: 'pie',

                    title: 'Distribuição por Setor',

                    data: '| Setor         | Valor |\n|---------------|-------|\n| Aviação Civil | 45    |\n| Infraestrutura| 25    |\n| Regulação     | 20    |\n| Outros        | 10    |',

                    dataSource: 'markdown',

                },

                {

                    label: '🕸️ Radar',

                    type: 'radar',

                    title: 'Avaliação de Desempenho',

                    data: '| Critério   | Meta | Realizado |\n|------------|------|-----------|\n| Qualidade  | 100  | 85        |\n| Prazo      | 100  | 92        |\n| Custo      | 100  | 78        |\n| Satisfação | 100  | 88        |',

                    dataSource: 'markdown',

                },

                {

                    label: '🍩 Rosca',

                    type: 'doughnut',

                    title: 'Proporção por Tipo',

                    data: '| Tipo          | %  |\n|---------------|----|\n| Doméstico     | 52 |\n| Internacional | 33 |\n| Carga         | 15 |',

                    dataSource: 'markdown',

                },

            ];



            const [chartType, setChartType] = useState('bar');

            const [title, setTitle] = useState('Título do Gráfico');

            const [palette, setPalette] = useState('');

            const [dataSource, setDataSource] = useState('markdown');

            const [mdData, setMdData] = useState(

                '| Categoria | Valor 1 | Valor 2 |\n|-----------|---------|---------|\n| A         | 100     | 80      |\n| B         | 200     | 150     |\n| C         | 150     | 180     |'

            );

            const [url, setUrl] = useState('');

            const [fontSize, setFontSize] = useState('');

            const [titleSize, setTitleSize] = useState('');

            const [tickSize, setTickSize] = useState('');

            const [tooltipSize, setTooltipSize] = useState('');

            const [aspectRatio, setAspectRatio] = useState('');

            const [height, setHeight] = useState('');

            const [showLegend, setShowLegend] = useState('true');

            const [showLabels, setShowLabels] = useState('false');

            const [animationDuration, setAnimationDuration] = useState('');

            const [animationEasing, setAnimationEasing] = useState('');



            const applyPreset = (p) => {

                setChartType(p.type);

                setTitle(p.title);

                setMdData(p.data);

                setDataSource(p.dataSource);

                setUrl('');

                setPalette('anac-classica');

            };



            const buildChartBlock = () => {

                let block = '```chart\n';

                block += 'type: ' + chartType + '\n';

                if (title) block += 'title: ' + title + '\n';

                if (palette) block += 'palette: ' + palette + '\n';

                if (dataSource === 'url' && url) block += 'url: ' + url + '\n';

                if (fontSize) block += 'fontSize: ' + fontSize + '\n';

                if (titleSize) block += 'titleSize: ' + titleSize + '\n';

                if (tickSize) block += 'tickSize: ' + tickSize + '\n';

                if (tooltipSize) block += 'tooltipSize: ' + tooltipSize + '\n';

                if (aspectRatio) block += 'aspectRatio: ' + aspectRatio + '\n';

                if (height) block += 'height: ' + height + '\n';

                if (showLegend !== 'true') block += 'showLegend: ' + showLegend + '\n';

                if (showLabels !== 'false') block += 'showLabels: ' + showLabels + '\n';

                if (animationDuration) block += 'animationDuration: ' + animationDuration + '\n';

                if (animationEasing) block += 'animationEasing: ' + animationEasing + '\n';

                if (dataSource === 'markdown') block += mdData.trimEnd() + '\n';

                block += '```';

                return block;

            };



            const handleInsert = () => {

                const block = buildChartBlock();

                const el = editorRef.current;

                if (el) {

                    const start = el.selectionStart;

                    const val = el.value;

                    const before = val.substring(0, start);

                    const after = val.substring(el.selectionEnd);

                    const prefix = before.length > 0 && !before.endsWith('\n') ? '\n\n' : '';

                    const suffix = after.length > 0 && !after.startsWith('\n') ? '\n\n' : '\n';

                    const newVal = before + prefix + block + suffix + after;

                    setSlideContent(newVal);

                    el.value = newVal;

                    const newCursor = before.length + prefix.length + block.length + suffix.length;

                    el.selectionStart = newCursor;

                    el.selectionEnd = newCursor;

                    el.dispatchEvent(new Event('input', { bubbles: true }));

                    el.focus();

                } else {

                    const cur = slides[currentIndex] || '';

                    const sep = cur.length > 0 && !cur.endsWith('\n') ? '\n\n' : '';

                    setSlideContent(cur + sep + block + '\n');

                }

                onClose();

            };



            useEffect(() => {

                if (open && window.lucide) setTimeout(() => window.lucide.createIcons(), 50);

            }, [open]);



            if (!open) return null;



            const preview = buildChartBlock();



            return (

                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4">

                    <div className="bg-white rounded-lg shadow-xl w-full max-w-5xl max-h-[92vh] flex flex-col overflow-hidden">

                        <div className="p-4 border-b flex justify-between items-center bg-zinc-50">

                            <h2 className="text-lg font-semibold text-zinc-800">📊 Inserir Gráfico</h2>

                            <button onClick={onClose} className="text-zinc-500 hover:text-zinc-800 p-1">

                                <i data-lucide="x" className="w-5 h-5"></i>

                            </button>

                        </div>

                        <div className="flex-1 overflow-y-auto">

                            <div className="p-4 border-b bg-blue-50">

                                <p className="text-xs font-semibold text-blue-700 mb-2 uppercase tracking-wide">Exemplos prontos — clique para carregar</p>

                                <div className="flex flex-wrap gap-2">

                                    {PRESETS.map((p, idx) => (

                                        <button key={idx} onClick={() => applyPreset(p)}

                                            className="px-3 py-1.5 text-sm rounded-full bg-white border border-blue-300 text-blue-700 hover:bg-blue-100 transition-colors font-medium">

                                            {p.label}

                                        </button>

                                    ))}

                                </div>

                            </div>

                            <div className="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">

                                <div className="space-y-4">

                                    <h3 className="font-semibold text-zinc-900 border-b pb-2">Configuração</h3>

                                    <div className="grid grid-cols-2 gap-4">

                                        <div>

                                            <label className="block text-sm font-medium text-zinc-700 mb-1">Tipo de Gráfico</label>

                                            <select className="w-full border border-zinc-300 rounded px-3 py-2 text-sm" value={chartType} onChange={e => setChartType(e.target.value)}>

                                                <option value="bar">Barra (Bar)</option>

                                                <option value="line">Linha (Line)</option>

                                                <option value="pie">Torta (Pie)</option>

                                                <option value="doughnut">Rosca (Doughnut)</option>

                                                <option value="radar">Radar</option>

                                                <option value="polarArea">Área Polar</option>

                                            </select>

                                        </div>

                                        <div>

                                            <label className="block text-sm font-medium text-zinc-700 mb-1">Paleta de Cores</label>

                                            <select className="w-full border border-zinc-300 rounded px-3 py-2 text-sm" value={palette} onChange={e => setPalette(e.target.value)}>

                                                <option value="">Chart.js Padrão</option>

                                            </select>

                                        </div>

                                    </div>

                                    <div>

                                        <label className="block text-sm font-medium text-zinc-700 mb-1">Título</label>

                                        <input type="text" className="w-full border border-zinc-300 rounded px-3 py-2 text-sm" value={title} onChange={e => setTitle(e.target.value)} placeholder="Título do Gráfico" />

                                    </div>

                                    <div className="grid grid-cols-4 gap-3">

                                        <div>

                                            <label className="block text-sm font-medium text-zinc-700 mb-1">Legenda (em)</label>

                                            <input type="number" step="0.1" min="0.1" className="w-full border border-zinc-300 rounded px-3 py-2 text-sm" value={fontSize} onChange={e => setFontSize(e.target.value)} placeholder="1.1" />

                                        </div>

                                        <div>

                                            <label className="block text-sm font-medium text-zinc-700 mb-1">Título (em)</label>

                                            <input type="number" step="0.1" min="0.1" className="w-full border border-zinc-300 rounded px-3 py-2 text-sm" value={titleSize} onChange={e => setTitleSize(e.target.value)} placeholder="1.4" />

                                        </div>

                                        <div>

                                            <label className="block text-sm font-medium text-zinc-700 mb-1">Eixos (em)</label>

                                            <input type="number" step="0.1" min="0.1" className="w-full border border-zinc-300 rounded px-3 py-2 text-sm" value={tickSize} onChange={e => setTickSize(e.target.value)} placeholder="0.9" />

                                        </div>

                                        <div>

                                            <label className="block text-sm font-medium text-zinc-700 mb-1">Tooltips (em)</label>

                                            <input type="number" step="0.1" min="0.1" className="w-full border border-zinc-300 rounded px-3 py-2 text-sm" value={tooltipSize} onChange={e => setTooltipSize(e.target.value)} placeholder="0.85" />

                                        </div>

                                    </div>

                                    <div className="grid grid-cols-4 gap-3">

                                        <div>

                                            <label className="block text-sm font-medium text-zinc-700 mb-1">Proporção</label>

                                            <input type="number" step="0.1" min="0.1" className="w-full border border-zinc-300 rounded px-3 py-2 text-sm" value={aspectRatio} onChange={e => setAspectRatio(e.target.value)} placeholder="Auto (2.0)" title="Aspect Ratio (Ex: 2 = largo, 1 = quadrado)" />

                                        </div>

                                        <div>

                                            <label className="block text-sm font-medium text-zinc-700 mb-1">Altura (px)</label>

                                            <input type="number" step="10" className="w-full border border-zinc-300 rounded px-3 py-2 text-sm" value={height} onChange={e => setHeight(e.target.value)} placeholder="Auto" />

                                        </div>

                                        <div>

                                            <label className="block text-sm font-medium text-zinc-700 mb-1">Legenda</label>

                                            <select className="w-full border border-zinc-300 rounded px-3 py-2 text-sm" value={showLegend} onChange={e => setShowLegend(e.target.value)}>

                                                <option value="true">Sim</option>

                                                <option value="false">Não</option>

                                            </select>

                                        </div>

                                        <div>

                                            <label className="block text-sm font-medium text-zinc-700 mb-1">Rótulos (Labels)</label>

                                            <select className="w-full border border-zinc-300 rounded px-3 py-2 text-sm" value={showLabels} onChange={e => setShowLabels(e.target.value)}>

                                                <option value="false">Não</option>

                                                <option value="true">Sim</option>

                                            </select>

                                        </div>

                                    </div>

                                    <div className="grid grid-cols-2 gap-3">

                                        <div>

                                            <label className="block text-sm font-medium text-zinc-700 mb-1">Animação (ms)</label>

                                            <input type="number" className="w-full border border-zinc-300 rounded px-3 py-2 text-sm" value={animationDuration} onChange={e => setAnimationDuration(e.target.value)} placeholder="1000" />

                                        </div>

                                        <div>

                                            <label className="block text-sm font-medium text-zinc-700 mb-1">Easing</label>

                                            <select className="w-full border border-zinc-300 rounded px-3 py-2 text-sm" value={animationEasing} onChange={e => setAnimationEasing(e.target.value)}>

                                                <option value="">Padrão</option>

                                                <option value="linear">Linear</option>

                                                <option value="easeOutQuad">Ease Out Quad</option>

                                                <option value="easeInOutQuad">Ease In Out Quad</option>

                                            </select>

                                        </div>

                                    </div>

                                    <h3 className="font-semibold text-zinc-900 border-b pb-2 mt-2">Fonte de Dados</h3>

                                    <div className="flex gap-4">

                                        <label className="flex items-center gap-2 text-sm cursor-pointer">

                                            <input type="radio" name="dataSource" value="markdown" checked={dataSource === 'markdown'} onChange={() => setDataSource('markdown')} />

                                            Tabela Markdown

                                        </label>

                                        <label className="flex items-center gap-2 text-sm cursor-pointer">

                                            <input type="radio" name="dataSource" value="url" checked={dataSource === 'url'} onChange={() => setDataSource('url')} />

                                            URL (CSV/JSON)

                                        </label>

                                    </div>

                                    {dataSource === 'markdown' ? (

                                        <div>

                                            <p className="text-xs text-zinc-500 mb-1">Primeira coluna = labels. Demais colunas = séries de dados.</p>

                                            <textarea className="w-full border border-zinc-300 rounded px-3 py-2 text-sm font-mono h-36 focus:outline-none focus:ring-1 focus:ring-blue-500" value={mdData} onChange={e => setMdData(e.target.value)} spellCheck={false} />

                                        </div>

                                    ) : (

                                        <div>

                                            <input type="url" className="w-full border border-zinc-300 rounded px-3 py-2 text-sm" value={url} onChange={e => setUrl(e.target.value)} placeholder="https://exemplo.com/dados.csv" />

                                            <p className="text-xs text-zinc-500 mt-1">URL que retorna CSV ou JSON compatível com Chart.js.</p>

                                        </div>

                                    )}

                                </div>

                                <div className="flex flex-col">

                                    <h3 className="font-semibold text-zinc-900 mb-2">Preview do bloco Markdown</h3>

                                    <p className="text-xs text-zinc-500 mb-2">Este bloco será inserido no editor ao clicar em Inserir.</p>

                                    <pre className="flex-1 overflow-auto text-xs bg-zinc-900 text-green-300 p-4 rounded-md font-mono whitespace-pre border border-zinc-700 min-h-[200px]">{preview}</pre>

                                </div>

                            </div>

                        </div>

                        <div className="p-4 border-t flex justify-end gap-2 bg-zinc-50">

                            <button className="px-4 py-2 rounded font-medium text-zinc-600 hover:bg-zinc-200 transition-colors" onClick={onClose}>Cancelar</button>

                            <button className="px-5 py-2 rounded font-medium bg-blue-600 text-white hover:bg-blue-700 transition-colors shadow-sm" onClick={handleInsert}>Inserir Gráfico</button>

                        </div>

                    </div>

                </div>

            );

        }

                date: new Date().toISOString().split('T')[0],

                center: false

            });

            const [galleryOpen, setGalleryOpen] = useState(false);



            const editorRef = useRef(null);

            const imageStoreRef = useRef({ _nextId: 0 });

            useEffect(() => {
                const stateToSave = { slides, currentIndex, theme, config };
                localStorage.setItem('anac_slide_data', JSON.stringify(stateToSave));
            }, [slides, currentIndex, theme, config]);

            const resetDocument = useCallback(() => {
                if (confirm('Tem certeza de que deseja criar um novo documento? Todo o progresso não salvo será perdido.')) {
                    localStorage.removeItem('anac_slide_data');
                    setSlides([...DEFAULT_SLIDES]);
                    setCurrentIndex(0);
                    setTheme('anac-classica');
                    setConfig(prev => ({
                        ...prev,
                        title: 'Nova Apresentação',
                        subtitle: 'Subtítulo',
                        author: ['Equipe ANAC']
                    }));
                }
            }, []);



            const insertMD = useCallback((before, after) => {

                const el = editorRef.current;

                if (!el) return;

                const start = el.selectionStart;

                const end = el.selectionEnd;

                const val = el.value;

                const sel = val.substring(start, end);

                const needsNewline = (before === '# ' || before === '- ') && start > 0 && val[start - 1] !== '\n';

                const prefix = needsNewline ? '\n' : '';

                const replacement = prefix + before + sel + after;



                document.execCommand('insertText', false, replacement);

                el.focus();

                if (sel.length === 0) {

                    const pos = start + prefix.length + before.length;

                    el.selectionStart = pos;

                    el.selectionEnd = pos;

                }

                el.dispatchEvent(new Event('input', { bubbles: true }));

            }, []);



            const insertLayout = useCallback((type) => {

                const layout = LAYOUTS[type];

                if (layout) insertMD(layout, '');

            }, [insertMD]);



            const setSlideContent = useCallback((value) => {

                setSlides(prev => {

                    const next = [...prev];

                    next[currentIndex] = value;

                    return next;

                });

            }, [currentIndex]);



            const parseAndLoadPresentation = useCallback((text) => {
                try {
                    const frontmatterRegex = /^---\n([\s\S]*?)\n---\n/;
                    const match = text.match(frontmatterRegex);

                    let content = text;
                    if (match) {
                        const yamlString = match[1];
                        content = text.replace(frontmatterRegex, '');

                        setConfig(prevConfig => {
                            const newConfig = { ...prevConfig };
                            yamlString.split('\n').forEach(line => {
                                const [key, ...values] = line.split(':');
                                if (key && values.length) {
                                    const val = values.join(':').trim().replace(/^['"](.*)['"]$/, '$1');
                                    const k = key.trim();
                                    if (k === 'title') newConfig.title = val;
                                    if (k === 'subtitle') newConfig.subtitle = val;
                                    if (k === 'author') newConfig.author = [val];
                                }
                            });
                            return newConfig;
                        });
                    }

                    const parts = content.split(/\n\n---\n\n/);
                    const newSlides = parts.map(p => p.trim()).filter(Boolean);
                    setSlides(newSlides.length > 0 ? newSlides : ['']);
                    setCurrentIndex(0);
                } catch (err) {
                    console.error('Erro ao processar conteúdo:', err);
                    const parts = text.split(/\n\n---\n\n/);
                    const newSlides = parts.map(p => p.trim()).filter(Boolean);
                    setSlides(newSlides.length > 0 ? newSlides : ['']);
                    setCurrentIndex(0);
                }
            }, []);

            const setSlidesFromFull = useCallback((parts) => {

                setSlides(parts.length > 0 ? parts : ['']);

            }, []);



            const nextSlide = useCallback(() => {

                setCurrentIndex(i => Math.min(i + 1, slides.length - 1));

            }, [slides.length]);



            const prevSlide = useCallback(() => {

                setCurrentIndex(i => Math.max(i - 1, 0));

            }, []);



            const NEW_SLIDE_PLACEHOLDER = "## Novo Slide\n\nAdicione seu conteúdo aqui.";

            const addSlide = useCallback(() => {

                setSlides(prev => {

                    const next = [...prev];

                    next.splice(currentIndex + 1, 0, NEW_SLIDE_PLACEHOLDER);

                    return next;

                });

                setCurrentIndex(i => i + 1);

            }, [currentIndex]);



            const deleteSlide = useCallback(() => {

                if (slides.length <= 1) return;

                setSlides(prev => {

                    const next = [...prev];

                    next.splice(currentIndex, 1);

                    return next;

                });

                setCurrentIndex(i => Math.min(i, slides.length - 2));

            }, [slides.length, currentIndex]);



            const showFullscreenPreview = useCallback(() => {
                setFullscreenPreview(true);
            }, []);

            const previewSlides = useCallback(() => {

                const w = window.open();

                w.document.write(generateRevealHTML(slides, config, theme, imageStoreRef));

                w.document.close();

            }, [slides, config, theme]);



            const getSlug = useCallback(() => slugify(config.title), [config.title]);



            const downloadHTML = useCallback(() => {

                const blob = new Blob([generateRevealHTML(slides, config, theme, imageStoreRef)], { type: 'text/html' });

                const a = document.createElement('a');

                a.href = URL.createObjectURL(blob);

                a.download = `${getSlug()}.html`;

                a.click();

            }, [slides, config, theme, getSlug]);



            const downloadPDF = useCallback(() => {

                let html = generateRevealHTML(slides, config, theme, imageStoreRef)

                    .replace('</head>', '<style>@media print { .reveal .slides { height: auto !important; } }</style></head>');

                const w = window.open('', '_blank');

                w.document.write(html);

                w.document.close();

                setTimeout(() => { w.print(); }, 1000);

            }, [slides, config, theme]);



            const generateRawText = useCallback(() => {
                const authors = Array.isArray(config.author) && config.author.length > 0
                    ? config.author.map(a => `  - "${a.trim()}"`).join('\n') : '';
                let frontMatter = '---\n';
                if (config.title) frontMatter += `title: "${config.title}"\n`;
                if (config.subtitle) frontMatter += `subtitle: "${config.subtitle}"\n`;
                if (authors) frontMatter += `author:\n${authors}\n`;
                if (config.date) frontMatter += `date: "${config.date}"\n`;
                frontMatter += `theme: "${theme}"\n---\n\n`;

                let md = slides.map((s) => {
                    return imageStoreRef ? getSlideWithExpanded(s, imageStoreRef) : s;
                }).join('\n\n---\n\n');
                return frontMatter + md;
            }, [slides, config, theme]);

            const downloadMD = useCallback(() => {
                const blob = new Blob([generateRawText()], { type: 'text/markdown' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `${getSlug()}.md`;
                a.click();
            }, [generateRawText, getSlug]);

            const downloadTXT = useCallback(() => {
                const blob = new Blob([generateRawText()], { type: 'text/plain' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `${getSlug()}.txt`;
                a.click();
            }, [generateRawText, getSlug]);

            const copyToClipboard = useCallback(() => {
                navigator.clipboard.writeText(generateRawText()).then(() => {
                    showToast('Copiado para a área de transferência');
                }).catch(e => {
                    console.error('Failed to copy', e);
                    showToast('Erro ao copiar');
                });
            }, [generateRawText]);

            const downloadCSV = useCallback(() => {
                let csv = 'Slide,Content\n';
                slides.forEach((s, i) => {
                    const content = s.replace(/"/g, '""');
                    csv += `"${i + 1}","${content}"\n`;
                });
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `${getSlug()}.csv`;
                a.click();
            }, [slides, getSlug]);

            const downloadTSV = useCallback(() => {
                let tsv = 'Slide\tContent\n';
                slides.forEach((s, i) => {
                    const content = s.replace(/\t/g, ' ').replace(/\n/g, '\\n');
                    tsv += `${i + 1}\t${content}\n`;
                });
                const blob = new Blob([tsv], { type: 'text/tab-separated-values;charset=utf-8;' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `${getSlug()}.tsv`;
                a.click();
            }, [slides, getSlug]);



            const openConfig = useCallback(() => setConfigOpen(true), []);

            const closeConfig = useCallback(() => setConfigOpen(false), []);



            const insertImage = useCallback((file) => {

                const reader = new FileReader();

                reader.onload = function (e) {

                    const alt = file.name.replace(/\.[^.]+$/, '');

                    const dataUrl = e.target.result;

                    const store = getImageStore(imageStoreRef);

                    const id = store._nextId++;

                    store._map[id] = { alt, dataUrl };

                    const token = `[img:${id}]`;

                    const el = editorRef.current;

                    if (el) {

                        el.focus();

                        document.execCommand('insertText', false, token);

                        el.dispatchEvent(new Event('input', { bubbles: true }));

                    }

                };

                reader.readAsDataURL(file);

            }, []);



            const insertImages = useCallback(async (files) => {

                const store = getImageStore(imageStoreRef);

                let tokens = '';

                const el = editorRef.current;

                for (const file of files) {

                    if (!file.type.startsWith('image/')) continue;

                    const dataUrl = await readFileAsDataURL(file);

                    const alt = file.name.replace(/\.[^.]+$/, '');

                    const id = store._nextId++;

                    store._map[id] = { alt, dataUrl };

                    tokens += `[img:${id}]`;

                }

                if (el && tokens) {

                    el.focus();

                    document.execCommand('insertText', false, tokens);

                    el.dispatchEvent(new Event('input', { bubbles: true }));

                }

            }, []);



            const loadChartDemos = useCallback(() => {

                const demos = [

                    '# Demonstração de Gráficos\n\nSlides com exemplos de todos os tipos de gráficos disponíveis e variações de markdown.\n\n![Capa](https://images.unsplash.com/photo-1542204165-65bf26472b9b?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80)',

                    '## Conteúdos Markdown\n\n- **Negrito**, *Itálico*, ~~Tachado~~, ==Destaque==\n- [Link para ANAC](https://www.gov.br/anac)\n\n> Citação importante sobre a aviação civil no Brasil.\n\n`Código inline`\n\n```javascript\n// Bloco de código\nconst anac = "Agência Nacional de Aviação Civil";\n```',

                    '## Tabela de Exemplo\n\n| Ano | Passageiros | Carga (ton) |\n|---|---|---|\n| 2021 | 60.000 | 1.200 |\n| 2022 | 80.000 | 1.350 |\n| 2023 | 110.000 | 1.500 |',

                    '## Gráfico de Barras\n\n```chart\ntype: bar\ntitle: Demanda por Região\naspectRatio: 2\nRegion | Domestic | International\nNorte | 1200 | 300\nSul | 900 | 150\nLeste | 2500 | 1200\nOeste | 1800 | 800\n```',

                    '## Gráfico de Linhas\n\n```chart\ntype: line\ntitle: Evolução de Passageiros\naspectRatio: 2\nMonth | 2022 | 2023\nJan | 40 | 50\nFeb | 45 | 55\nMar | 50 | 65\nApr | 48 | 70\nMay | 55 | 75\n```',

                    '## Gráfico de Pizza\n\n```chart\ntype: pie\ntitle: Participação de Mercado\naspectRatio: 1.2\nCompany | Share\nAzul | 35\nGol | 30\nLatam | 30\nOutras | 5\n```',

                    '## Gráfico de Rosca (Doughnut)\n\n```chart\ntype: doughnut\ntitle: Distribuição por Tipo de Voo\naspectRatio: 1.2\nType | Value\nComercial | 70\nExecutiva | 20\nCarga | 10\n```',

                    '## Gráfico Radar\n\n```chart\ntype: radar\ntitle: Avaliação de Desempenho\naspectRatio: 1.0\nMetric | Aeroporto A | Aeroporto B\nInfra | 80 | 90\nAtendimento | 75 | 85\nSegurança | 95 | 90\nLimpeza | 85 | 80\n```',

                    '## Gráfico Área Polar\n\n```chart\ntype: polarArea\ntitle: Distribuição por Categoria\naspectRatio: 1.0\nCategory | Value\nCat 1 | 20\nCat 2 | 40\nCat 3 | 30\nCat 4 | 50\n```',

                    '## Barras Horizontais\n\n```chart\ntype: bar\nhorizontal: true\ntitle: Ranking de Aeroportos\naspectRatio: 2\nAirport | Score\nGRU | 95\nBSB | 92\nCGH | 88\nSDU | 85\n```',

                    '## Barras Empilhadas\n\n```chart\ntype: bar\nstacked: true\ntitle: Composição de Receita\naspectRatio: 2\nQuarter | Tickets | Cargo | Services\nQ1 | 500 | 200 | 100\nQ2 | 600 | 220 | 120\nQ3 | 750 | 250 | 150\nQ4 | 800 | 300 | 200\n```'

                ];

                setSlides(demos);

                setCurrentIndex(0);

            }, []);



            const ctxValue = {

                slides, setSlides, currentIndex, setCurrentIndex, setSlideContent, setSlidesFromFull, parseAndLoadPresentation, resetDocument,

                editMode, setEditMode, theme, setTheme,

                config, setConfig, configOpen, openConfig, closeConfig,

                editorRef, insertMD, insertLayout, insertImage, insertImages,

                nextSlide, prevSlide, addSlide, deleteSlide,

                previewSlides, showFullscreenPreview, downloadHTML, downloadPDF, downloadMD, copyToClipboard, downloadTXT, downloadCSV, downloadTSV,

                imageStoreRef, galleryOpen, setGalleryOpen,

                chartOpen, setChartOpen, loadChartDemos

            };



            return (

                <AppContext.Provider value={ctxValue}>

                    <div className="h-screen flex flex-col overflow-hidden">

                        <Header />

                        <Toolbar />

                        <Editor />

                        <Footer />

                        <ConfigModal />

                        <ImageGalleryModal

                            open={galleryOpen}

                            onClose={() => setGalleryOpen(false)}

                        />

                        <ChartModal open={chartOpen} onClose={() => setChartOpen(false)} />

                        {fullscreenPreview && (
                            <div className="fixed inset-0 z-[9999] bg-black">
                                <button 
                                    className="absolute top-4 left-4 z-50 flex items-center justify-center w-10 h-10 bg-black/50 hover:bg-black/80 rounded-full text-white transition-colors"
                                    onClick={() => setFullscreenPreview(false)}
                                    title="Fechar Apresentação"
                                >
                                    <Icon name="x" className="w-6 h-6" />
                                </button>
                                <iframe 
                                    className="w-full h-full border-none"
                                    srcDoc={generateRevealHTML(slides, config, theme, imageStoreRef)}
                                    title="Apresentação em Tela Cheia"
                                />
                            </div>
                        )}

                    </div>

                </AppContext.Provider>

            );

        }



        // ---- Mount ----

        const root = ReactDOM.createRoot(document.getElementById('root'));

        root.render(React.createElement(App));

    </script>

</body>



</html>
