<body>

    <div id="root"></div>

    <script src="dados_temas.js"></script>

    <script type="text/babel">

        const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;



        function showToast(msg, duration) {

            const el = document.getElementById('toast');

            if (!el) return;

            el.textContent = msg;

            el.classList.add('show');

            clearTimeout(el._timer);

            el._timer = setTimeout(() => el.classList.remove('show'), duration || 2500);

        }



        // ---- Icons component ----

        function Icon({ name, className }) {

            const ref = useRef(null);

            useEffect(() => {

                if (ref.current) {

                    ref.current.innerHTML = '';

                    const el = document.createElement('i');

                    el.setAttribute('data-lucide', name);

                    if (className) el.className = className;

                    ref.current.appendChild(el);

                    lucide.createIcons();

                }

            }, [name, className]);

            return React.createElement('span', { ref });

        }



        function createIcon(name) {

            return React.createElement(Icon, { name });

        }



        function getContrastText(hex) {

            if (!hex) return '#ffffff';

            const c = hex.replace('#', '');

            const r = parseInt(c.substring(0, 2), 16);

            const g = parseInt(c.substring(2, 4), 16);

            const b = parseInt(c.substring(4, 6), 16);

            const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;

            return lum > 0.5 ? '#183859' : '#ffffff';

        }



        // ---- Constants ----

        const THEMES = window.THEMES_DATA;



        const SLIDE_SEP = "\n\n---\n\n";

        const DEFAULT_SLIDES = [

            "## Título do Slide\n\nEste é um parágrafo de exemplo. Substitua este texto pelo seu conteúdo.\n\n- Item 1 da lista não numerada\n- Item 2 da lista não numerada\n- Item 3 da lista não numerada\n\n1. Primeiro item numerado\n2. Segundo item numerado\n3. Terceiro item numerado",

            "## Novo Slide\n\nAdicione seu conteúdo aqui."

        ];



        const LAYOUTS = {

            'half': `

<div class="columns-2">



<div class="column">



### Coluna 1

Conteúdo



</div>



<div class="column">



### Coluna 2

Conteúdo



</div>



</div>

`,

            'thirds': `

<div class="columns-3">



<div class="column">



#### Coluna 1

Conteúdo



</div>



<div class="column">



#### Coluna 2

Conteúdo

<div class="column">

</div>

`,

<div class="columns-2-1">



<div class="column-large">



### Principal

Conteúdo longo



</div>



<div class="column-small">

</div>

`,

<div class="columns-1-2">



<div class="column-small">

Complemento



</div>



<div class="column-large">



### Principal

Conteúdo longo



</div>



</div>

`,

            'table': `

| Coluna 1 | Coluna 2 | Coluna 3 |
|----------|----------|----------|
| Dado 1   | Dado 2   | Dado 3   |
| Dado 1   | Dado 2   | Dado 3   |
| Dado 1   | Dado 2   | Dado 3   |

`

        };



        // ---- ANAC Color System ----

        const ANAC_CORES = {

            ciano: { rgb: [0, 156, 221], hex: '#009CDD' },

            azulEscuro: { rgb: [29, 97, 143], hex: '#1D618F' },

            lilas: { rgb: [71, 73, 132], hex: '#474984' },

            verdeOceano: { rgb: [42, 144, 171], hex: '#2A90AB' },

            azulOceano: { rgb: [36, 61, 125], hex: '#243D7D' },

            azulProfundo: { rgb: [24, 56, 89], hex: '#183859' },

            amarelo: { rgb: [248, 177, 51], hex: '#F8B133' }

        };



        const PALETAS_ANAC = {

            'anac-classica': { p60: 'azulProfundo', p30: 'azulOceano', p10: 'amarelo' },

            'anac-contemporanea': { p60: 'azulEscuro', p30: 'ciano', p10: 'amarelo' },

            'anac-oceano': { p60: 'azulOceano', p30: 'verdeOceano', p10: 'amarelo' },

            'anac-profundo': { p60: 'azulProfundo', p30: 'azulEscuro', p10: 'ciano' },

            'anac-institucional': { p60: 'azulProfundo', p30: 'lilas', p10: 'amarelo' },

            'anac-tropical': { p60: 'azulEscuro', p30: 'verdeOceano', p10: 'amarelo' }

        };



        const ORDEM_CORES_GRAFICO = ['azulProfundo', 'ciano', 'amarelo', 'azulOceano', 'verdeOceano', 'lilas', 'azulEscuro'];



        const PALETAS_GRAFICOS = {};





        function hexToRgba(hex, opacity) {

            const r = parseInt(hex.slice(1, 3), 16);

            const g = parseInt(hex.slice(3, 5), 16);

            const b = parseInt(hex.slice(5, 7), 16);

            return `rgba(${r},${g},${b},${opacity})`;

        }



        function tonal(hex, pct) {

            const r = Math.min(255, Math.round(parseInt(hex.slice(1, 3), 16) + (255 - parseInt(hex.slice(1, 3), 16)) * (1 - pct)));

            const g = Math.min(255, Math.round(parseInt(hex.slice(3, 5), 16) + (255 - parseInt(hex.slice(3, 5), 16)) * (1 - pct)));

            const b = Math.min(255, Math.round(parseInt(hex.slice(5, 7), 16) + (255 - parseInt(hex.slice(5, 7), 16)) * (1 - pct)));

            return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;

        }



        function gerarPaletaGrafico(n, themeId) {

            const p = getPaletaTheme(themeId) || getPaletaTheme('anac-classica');

            const themeColors = p ? [p.p60, p.p30, p.p10] : [];

            const paleta = [];

            for (let i = 0; i < n; i++) {

                let base;

                if (i < 3 && p) {

                    base = themeColors[i];

                } else {

                    const idx = (i - (p ? 3 : 0));

                    base = ANAC_CORES[ORDEM_CORES_GRAFICO[idx % ORDEM_CORES_GRAFICO.length]].hex;

                }

                const ciclo = Math.floor(i / ORDEM_CORES_GRAFICO.length);

                paleta.push(ciclo === 0 ? base : tonal(base, Math.max(0.5, 1 - ciclo * 0.15)));

            }

            return paleta;

        }



        function gerarOpacidades(hex) {

            return { 100: hex, 80: hexToRgba(hex, 0.8), 60: hexToRgba(hex, 0.6), 40: hexToRgba(hex, 0.4), 20: hexToRgba(hex, 0.2) };

        }



        function getPaletaTheme(themeId) {

            const p = PALETAS_ANAC[themeId];

            if (!p) return null;

            return {

                p60: ANAC_CORES[p.p60].hex,

                p30: ANAC_CORES[p.p30].hex,

                p10: ANAC_CORES[p.p10].hex

            };

        }

        function isAnacTheme(themeId) { return !!PALETAS_ANAC[themeId] || /^anac-20/.test(themeId) || themeId === 'anac-2023' || themeId === 'anac' || themeId === 'anac-branco'; }



        const TOOLBAR_ITEMS = [
            { type: 'btn', icon: 'undo', action: 'history', historyAction: 'undo', title: 'Desfazer (Ctrl+Z)' },
            { type: 'btn', icon: 'redo', action: 'history', historyAction: 'redo', title: 'Refazer (Ctrl+Y)' },
            { type: 'sep' },
            { type: 'btn', icon: 'heading-1', action: 'md', before: '# ', after: '', title: 'Título H1' },

            { type: 'btn', icon: 'heading-2', action: 'md', before: '## ', after: '', title: 'Título H2' },

            { type: 'btn', icon: 'heading-3', action: 'md', before: '### ', after: '', title: 'Título H3' },

            { type: 'sep' },

            { type: 'btn', icon: 'bold', action: 'md', before: '**', after: '**', title: 'Negrito' },

            { type: 'btn', icon: 'italic', action: 'md', before: '*', after: '*', title: 'Itálico' },

            { type: 'btn', icon: 'underline', action: 'md', before: '__', after: '__', title: 'Sublinhado' },

            { type: 'btn', icon: 'strikethrough', action: 'md', before: '~~', after: '~~', title: 'Tachado' },

            { type: 'btn', icon: 'highlighter', action: 'md', before: '==', after: '==', title: 'Destaque' },

            { type: 'sep' },

            { type: 'btn', icon: 'list', action: 'md', before: '- ', after: '', title: 'Lista' },

            { type: 'btn', icon: 'list-ordered', action: 'md', before: '1. ', after: '', title: 'Lista Numérica' },

            { type: 'btn', icon: 'quote', action: 'md', before: '> ', after: '', title: 'Citação' },

            { type: 'btn', icon: 'table', action: 'layout', layout: 'table', title: 'Inserir Tabela' },

            { type: 'btn', icon: 'bar-chart-3', action: 'chart', title: 'Inserir Gráfico' },

            { type: 'btn', icon: 'code', action: 'md', before: '```\n', after: '\n```', title: 'Bloco de Código' },

            { type: 'sep' },

            { type: 'btn', icon: 'link', action: 'md', before: '[', after: '](url)', title: 'Link' },

            { type: 'btn', icon: 'image', action: 'image-upload', title: 'Inserir Imagem (arquivo)' },

            { type: 'sep' },

            { type: 'btn', icon: 'columns-2', action: 'layout', layout: 'half', title: 'Layout Metade' },

            { type: 'btn', icon: 'columns-3', action: 'layout', layout: 'thirds', title: 'Layout Terços' },

            { type: 'btn', icon: 'panel-left', action: 'layout', layout: '2/3 left', title: '2/3 Esquerda' },

            { type: 'btn', icon: 'panel-right', action: 'layout', layout: '2/3 right', title: '2/3 Direita' }

        ];



        // ---- Image condensation ----

        const IMG_RE = /!\[([^\]]*)\]\((data:image\/[^;]+;base64,[^)]+)\)/g;

        const TOKEN_RE = /\[img:(\d+)\]/g;



        function getImageStore(imgRef) {

            if (!imgRef.current._map) imgRef.current._map = {};

            if (imgRef.current._nextId === undefined) imgRef.current._nextId = 0;

            return imgRef.current;

        }



        function condenseText(text, imgRef) {

            if (!text) return text;

            const store = getImageStore(imgRef);

            const map = store._map;

            return text.replace(IMG_RE, (match, alt, dataUrl) => {

                for (const k of Object.keys(map)) {

                    if (map[k].dataUrl === dataUrl) return `[img:${k}]`;

                }

                const id = store._nextId++;

                map[id] = { alt, dataUrl };

                return `[img:${id}]`;

            });

        }



        function expandText(text, imgRef) {

            if (!text) return text;

            const store = getImageStore(imgRef);

            const map = store._map;

            return text.replace(TOKEN_RE, (match, id) => {

                const entry = map[id];

                if (entry && entry.dataUrl) return `![${entry.alt}](${entry.dataUrl})`;

                return match;

            });

        }



        function getSlideWithExpanded(text, imgRef) {

            if (!text) return text;

            const store = getImageStore(imgRef);

            const map = store._map;

            let result = text;

            for (const id of Object.keys(map)) {

                const entry = map[id];

                if (entry && result.includes(`[img:${id}]`)) {

                    result = result.replaceAll(`[img:${id}]`, `![${entry.alt}](${entry.dataUrl})`);

                }

            }

            return result;

        }



        function slugify(text) {

            return (text || 'apresentacao')

                .normalize('NFD').replace(/[\u0300-\u036f]/g, '')

                .toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'apresentacao';

        }



        function getBase64Size(dataUrl) {

            const raw = dataUrl.split(',')[1] || '';

            return Math.round(raw.length * 0.75);

        }



        function readFileAsDataURL(file) {

            return new Promise((resolve) => {

                const r = new FileReader();

                r.onload = () => resolve(r.result);

                r.readAsDataURL(file);

            });

        }



        // ---- App Context ----

        const AppContext = React.createContext(null);



        // ---- Helper: Excel paste to Markdown table ----

        function excelToMarkdown(text) {

            const lines = text.split('\n').filter(l => l.trim());

            if (lines.length < 2) return null;

            const hasTabs = lines.some(l => l.includes('\t'));

            if (!hasTabs) return null;

            const headers = lines[0].split('\t').map(s => s.trim());

            const sep = headers.map(() => '---');

            const rows = lines.slice(1).map(l => l.split('\t').map(s => s.trim()));

            const maxCols = Math.max(headers.length, ...rows.map(r => r.length));

            while (headers.length < maxCols) headers.push('');

            while (sep.length < maxCols) sep.push('---');

            rows.forEach(r => { while (r.length < maxCols) r.push(''); });

            return '| ' + headers.join(' | ') + ' |\n| ' + sep.join(' | ') + ' |\n' + rows.map(r => '| ' + r.join(' | ') + ' |').join('\n') + '\n';

        }



        // ---- Helper: generate Reveal HTML ----

        function generateRevealHTML(slides, config, theme, imgRef) {

            const { title, subtitle, author, date, center } = config;

            const themeObj = THEMES.find(t => t.id === theme);

            const coverImg = config.coverImg || (themeObj && themeObj.defaultCover) || '';

            const closeImg = config.closeImg || (themeObj && themeObj.defaultClose) || '';

            if (imgRef) slides = slides.map(s => getSlideWithExpanded(s, imgRef));

            const isAnac = isAnacTheme(theme);

            const isAnac20 = /^anac-20/.test(theme) || theme === 'anac-2023';

            const themeBg = (themeObj && themeObj.bgColor) || '#0c2b5c';

            const themeText = getContrastText(themeBg);

            const jv = center ? 'center' : 'flex-start';

            const align = center ? 'center' : 'left';

            const to = center ? 'center' : 'left';



            let slidesHTML = '';



            if (isAnac && title) {

                let bg = coverImg ? ` data-background-image="${coverImg}" data-background-size="cover"` : '';

                slidesHTML += `<section data-state="title-slide"${bg}>`;

                slidesHTML += `<div class="capa-content">`;

                slidesHTML += `<h1>${escHtml(title)}</h1>`;

                if (subtitle) slidesHTML += `<h3>${escHtml(subtitle)}</h3>`;

                const fmtDate = date ? date.split('-').reverse().join('/') : '';

                const authorDisplay = Array.isArray(author) ? author.join(', ') : author;

                if (authorDisplay || date) slidesHTML += `<p style="margin-top:40px;font-size:0.6em;opacity:0.8;">${escHtml(authorDisplay)}${date ? ' &mdash; ' + fmtDate : ''}</p>`;

                slidesHTML += `</div></section>\n\n`;

            }



            slides.forEach(slide => {

                if (!slide.trim()) return;

                let processed = slide.replace(/==([^=]+)==/g, '<mark>$1</mark>');

                processed = processed.replace(/```chart\s*\n([\s\S]*?)```/g, function (match, inner) {

                    let yamlLines = [];

                    let tableLines = [];

                    const hasDivider = inner.includes('\n---\n');

                    if (hasDivider) {

                        const parts = inner.split('\n---\n');

                        yamlLines = parts[0].split('\n');

                        if (parts.length > 1) tableLines = parts[1].split('\n');

                    } else {

                        inner.split('\n').forEach(line => {

                            const trimmed = line.trim();

                            if (trimmed.startsWith('|') || trimmed.includes('|')) {

                                tableLines.push(line);

                            } else if (trimmed) {

                                yamlLines.push(line);

                            }

                        });

                    }

                    const yamlStr = yamlLines.join('\n').trim();

                    const tableStr = tableLines.join('\n').trim();

                    const config = {};

                    yamlStr.split('\n').forEach(line => {

                        const m = line.match(/^\s*(\w+):\s*(.+)/);

                        if (m) {

                            let val = m[2].trim();

                            if (m[1] === 'colors') {

                                val = val.replace(/^\[|\]$/g, '').split(',').map(function (s) { return s.trim().replace(/^['"]|['"]$/g, ''); });

                            } else if (val === 'true') val = true;

                            else if (val === 'false') val = false;

                            else if (!isNaN(val) && val !== '') val = Number(val);

                            config[m[1]] = val;

                        }

                    });

                    if (!config.type) config.type = 'bar';

                    const chartId = 'chart-' + Math.random().toString(36).slice(2, 8);

                    let labels = [], datasets = [];

                    if (tableStr) {

                        const lines = tableStr.split('\n').filter(function (l) {

                            const trimmed = l.trim();

                            if (!trimmed) return false;

                            const clean = trimmed.replace(/[|:\-\s]/g, '');

                            return clean !== '';

                        });

                        if (lines.length >= 2) {

                            const headers = lines[0].split('|').filter(h => h.trim()).map(h => h.trim());

                            const dataRows = lines.slice(1).map(l => l.split('|').filter(c => c.trim()).map(c => c.trim()));

                            labels = dataRows.map(r => r[0] || '');

                            for (let i = 1; i < headers.length; i++) {

                                datasets.push({

                                    label: headers[i],

                                    data: dataRows.map(r => isNaN(Number(r[i])) ? 0 : Number(r[i]))

                                });

                            }

                        }

                    }

                    let nColors = datasets.length;

                    if (['pie', 'doughnut', 'polarArea'].includes(config.type) && datasets.length > 0) {

                        nColors = Math.max(nColors, datasets[0].data.length);

                    }

                    const paleta = config.colors || (config.palette && PALETAS_GRAFICOS[config.palette] ? PALETAS_GRAFICOS[config.palette] : gerarPaletaGrafico(nColors, theme));

                    const darkBg = hexToRgba(themeBg, 1) === 'rgba(0,0,0,1)' || themeBg === '#000000' || (parseInt(themeBg.slice(1, 3), 16) + parseInt(themeBg.slice(3, 5), 16) + parseInt(themeBg.slice(5, 7), 16) < 382);

                    const cfg = JSON.stringify({ type: config.type, labels, datasets, paleta, palette: config.palette, title: config.title || '', stacked: !!config.stacked, horizontal: !!config.horizontal, showLegend: config.showLegend !== false, showLabels: !!config.showLabels, beginAtZero: config.beginAtZero !== false, height: config.height, aspectRatio: config.aspectRatio, fontSize: config.fontSize, titleSize: config.titleSize, tickSize: config.tickSize, animationDuration: config.animationDuration, animationEasing: config.animationEasing, textColor: themeText, gridColor: hexToRgba(themeText, 0.1), slideBgColor: themeBg, darkBg, url: config.url });

                    const heightStyle = config.height ? `height: ${config.height}px;` : '';

                    return `<div class="chart-box" style="${heightStyle}" data-chart='${cfg.replace(/'/g, '&apos;')}'><canvas id="${chartId}"></canvas></div>`;

                });

                const imgMatches = processed.match(/<img[^>]+>|!\[.*?\]\(.*?\)/g) || [];
                const hasCol = processed.includes(':::');
                const isSingleImg = imgMatches.length === 1 && !hasCol;
                let parsed = marked.parse(processed);

                let slideClass = "slide-content";
                if (isSingleImg) slideClass += " single-img-layout";
                slidesHTML += `<section data-auto-animate><div class="${slideClass}">${parsed}</div></section>\n\n`;

            });



            if (isAnac && closeImg) {

                slidesHTML += `<section data-background-image="${closeImg}" data-background-size="cover"></section>`;

            }



            const themeUrl = isAnac ? 'black' : 'white';



            let html = `<!DOCTYPE html>

<html>

<head>

    <meta charset="utf-8">

    <title>${escHtml(title || 'Apresentação')}</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/${themeUrl}.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"><\/script>

    <style>

        .reveal .slides section:not([data-state="title-slide"]) {

            height: 100% !important;

            display: flex !important;

            flex-direction: column !important;

            justify-content: ${jv};

            align-items: flex-start;

            text-align: ${align};

            overflow: hidden;

        }

        .slide-content { align-self: ${jv === 'center' ? 'center' : 'flex-start'}; max-height: 100%; overflow: visible; }

        .slide-content { width: 100%; box-sizing: border-box; }

        .slide-content table th,

        .slide-content table td {

            border: 1px solid currentColor;

            padding: 0.3em 0.6em;

            font-size: 0.75em;

        }

        .slide-content table thead tr:last-child th {

            border-bottom-width: 2px;

        }

        .slide-content table tbody tr:last-child td,

        .slide-content table tbody tr:last-child th {

            border-bottom: 1px solid currentColor;

        }

        .slide-content th {

            font-weight: 700;

            background: rgba(255,255,255,0.1);

        }

        .slide-content tr:nth-child(even) td {

            background: rgba(255,255,255,0.05);

        }

        .slide-content img {

            max-width: 100% !important;

            height: auto !important;

            object-fit: contain;

            border-radius: 6px;

        }

        .single-img-layout img {
            float: left;
            max-width: 70% !important;
            margin-right: 30px !important;
            margin-bottom: 20px !important;
        }

        .single-img-layout::after {
            content: "";
            display: table;
            clear: both;
        }

        .slide-content .slide-bg {

            max-width: 100%;

            height: auto;

            object-fit: contain;

            border-radius: 6px;

            min-height: 50vh;

            background-size: contain;

            background-repeat: no-repeat;

            background-position: center;

        }

        .slide-bg { width: 100%; border-radius: 8px; margin: 0 auto; }

        .reveal blockquote { border-left: 4px solid currentColor; padding-left: 1em; font-style: italic; opacity: 0.8; }

        .reveal mark { background: #fef08a; color: #000; padding: 0.1em 0.2em; }

        .columns-2, .columns-3, .columns-2-1, .columns-1-2 { display: flex; width: 100%; gap: 2em; align-items: flex-start; justify-content: center; margin-top: 0.5em; }

        .columns-2 > .column, .columns-3 > .column { flex: 1; }

        .columns-2-1 > .column-large { flex: 2; }

        .columns-2-1 > .column-small { flex: 1; }

        .columns-1-2 > .column-small { flex: 1; }

        .columns-1-2 > .column-large { flex: 2; }

        .column, .column-large, .column-small { text-align: center; }

        .table-scroll {

            overflow-y: auto;

            width: 100%;

            max-width: 100%;

        }

        .table-scroll::-webkit-scrollbar { width: 6px; height: 6px; }

        .table-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

        .chart-box { flex: 1; min-height: 250px; max-height: 600px; position: relative; width: 100%; display: flex; justify-content: center; align-items: center; margin: 0.5em 0; overflow: hidden; }

        .chart-box canvas { max-width: 100%; display: block; }

        .img-lightbox {

            display: none; position: fixed; top: 0; left: 0;

            width: 100vw; height: 100vh;

            background: rgba(0,0,0,0.85); z-index: 99999;

            cursor: pointer; align-items: center; justify-content: center;

        .img-lightbox img {

            max-width: 90vw; max-height: 90vh;

            object-fit: contain; border-radius: 4px;

            box-shadow: 0 4px 24px rgba(0,0,0,0.5); cursor: default;

        }

        ${isAnac ? `

        @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap");

        .reveal { font-family: "Montserrat", sans-serif; background-color: ${themeBg}; color: ${themeText}; }

        .reveal h1, .reveal h2, .reveal h3 { font-family: "Montserrat", sans-serif; font-weight: 700; color: ${themeText}; text-transform: none; }

        .reveal h2 { font-size: 1.6em; margin-bottom: 20px; }

        .reveal h3 { font-size: 1.3em; margin-bottom: 15px; }

        .reveal h4, .reveal h5, .reveal h6 { font-family: "Montserrat", sans-serif; font-weight: 600; color: ${themeText}; font-size: 1.1em; margin-bottom: 10px; }

        .reveal h1 { font-size: 2.2em; border-bottom: 2px solid rgba(255,255,255,0.2); padding-bottom: 10px; margin-bottom: 30px; text-align: center; }

        .reveal .slides section[data-state='title-slide'] .capa-content h1 { font-size: 1.7em; text-align: left; line-height: 1.15; margin-bottom: 10px; border-bottom: none; padding-bottom: 0; color: #ffffff !important; }

        .reveal .slides section[data-state='title-slide'] .capa-content h3 { font-size: 1.2em; text-align: left; opacity: 0.9; color: #ffffff !important; }

        .reveal .slides section[data-state='title-slide'] .capa-content p { font-size: 0.8em; margin-top: 20px; color: #ffffff !important; }

        ${isAnac20 ? `

        .reveal .slides section[data-state="title-slide"] { display: block !important; box-sizing: border-box !important; padding: 156px 74px 170px 568px !important; }

        .reveal .slides section[data-state="title-slide"] .capa-content { text-align: left !important; }

        ` : `

        .reveal .slides section[data-state="title-slide"] { display: flex !important; align-items: center !important; justify-content: flex-end !important; height: 100%; padding: 0; }

        .reveal .slides section[data-state="title-slide"] .capa-content { width: 42%; text-align: left; padding: 20px; align-self: center; margin-bottom: 0; }

        `}

        ` : ''}

    </style>

</head>

<body>

    <div class="reveal"><div class="slides">

        ${slidesHTML}

    </div></div>

    <div id="img-lightbox" class="img-lightbox" onclick="closeLightbox()">

        <img id="lightbox-img" src="" alt="" />

    </div>

    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"><\/script>

    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/zoom/zoom.js"><\/script>

    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/search/search.js"><\/script>\n    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"><\/script>

    <script>

        Reveal.initialize({

            hash: true, center: false, width: 1280, height: 720, margin: 0.04,

            slideNumber: 'c/t', controls: true, progress: true, touch: true,

            plugins: [ RevealZoom, RevealSearch, RevealNotes ]

        });

        window.addEventListener("resize", function() { var a = Reveal.getCurrentSlide(); if(a) adj(); });

        function adj() {

            var cur = Reveal.getCurrentSlide();

            if (!cur) return;

            var con = cur.querySelector(".slide-content");

            if (!con) return;



            con.style.transform = "none";

            con.style.width = "";

            con.style.display = "";

            con.style.alignItems = "";

            con.style.justifyContent = "";



            var cols = con.querySelectorAll(".column, .column-large, .column-small");

            for (var i = 0; i < cols.length; i++) cols[i].style.fontSize = "";



            var imgs = con.querySelectorAll("img");

            for (var i = 0; i < imgs.length; i++) {

                imgs[i].style.maxHeight = "";

                imgs[i].style.maxWidth = "";

                imgs[i].style.width = "";

                imgs[i].style.height = "";

            }



            var pad = 60;

            var maxH = cur.offsetHeight - pad;

            var maxW = cur.offsetWidth - pad;



            if (cols.length > 0) {

                var parent = cols[0].parentElement;

                var availColH = parent.offsetHeight || maxH * 0.7;

                var maxColH = 0;

                for (var i = 0; i < cols.length; i++) {

                    var ch = cols[i].scrollHeight;

                    if (ch > maxColH) maxColH = ch;

                }

                if (maxColH > availColH) {

                    var pct = Math.max(40, Math.round((availColH / maxColH) * 100));

                    for (var i = 0; i < cols.length; i++) {

                        cols[i].style.fontSize = pct + "%";

                    }

                }

            }



            var hasOnlyImg = imgs.length > 0;

            if (hasOnlyImg) {

                var texts = [];

                var walk = function(el) {

                    for (var i = 0; i < el.childNodes.length; i++) {

                        var n = el.childNodes[i];

                        if (n.nodeType === 3 && n.textContent.trim()) texts.push(n.textContent);

                        else if (n.nodeType === 1 && n.tagName !== "IMG" && n.tagName !== "BR") walk(n);

                    }

                };

                walk(con);

                hasOnlyImg = texts.length === 0;

            }



            if (hasOnlyImg && imgs.length === 1) {

                con.style.display = "flex";

                con.style.alignItems = "center";

                con.style.justifyContent = "center";



                var img = imgs[0];

                var maxImgW = maxW * 0.92;

                var maxImgH = maxH * 0.92;

                img.style.maxWidth = "100%";

                img.style.maxHeight = "";

                img.style.width = "auto";

                img.style.height = "auto";

                img.onload = function() { setTimeout(adj, 100); };

                if (img.naturalWidth && img.naturalHeight) {

                    var ratio = img.naturalWidth / img.naturalHeight;

                    var fitW = Math.min(img.naturalWidth, maxImgW);

                    var fitH = fitW / ratio;

                    if (fitH > maxImgH) { fitH = maxImgH; fitW = fitH * ratio; }

                    img.style.width = fitW + "px";

                    img.style.height = fitH + "px";

                    img.style.maxWidth = "none";

                }

                return;

            }



            if (imgs.length > 0) {

                for (var i = 0; i < imgs.length; i++) {

                    var img = imgs[i];

                    img.style.maxWidth = "100%";

                    img.style.height = "auto";

                    if (img.naturalWidth) {

                        var iw = img.naturalWidth;

                        var ih = img.naturalHeight;

                        if (iw > maxW * 0.9) {

                            var s = (maxW * 0.9) / iw;

                            img.style.width = (iw * s) + "px";

                            img.style.height = (ih * s) + "px";

                        }

                    }

                }

            }



            var table = con.querySelector("table");

            if (table) {

                var wrapper = table.parentElement;

                if (wrapper && wrapper.classList.contains('table-scroll')) {

                    wrapper.parentElement.insertBefore(table, wrapper);

                    wrapper.remove();

                }

                table.style.transform = "";

                table.style.width = "";

                table.style.marginBottom = "";

                var headings = con.querySelectorAll("h1, h2, h3, h4, h5, h6");

                var titleH = 0;

                for (var i = 0; i < headings.length; i++) titleH += headings[i].offsetHeight;

                var availH = Math.max(100, maxH - titleH - 20);

                var availW = maxW;

                var sx2 = availW / table.scrollWidth;

                var sy2 = availH / table.scrollHeight;

                var s2 = Math.min(sx2, sy2, 1);

                if (s2 < 1) {

                    if (s2 >= 0.6) {

                        table.style.transformOrigin = "top left";

                        table.style.transform = "scale(" + s2 + ")";

                        table.style.width = (table.scrollWidth / s2) + "px";

                        table.style.marginBottom = (-table.offsetHeight * (1 - s2)) + "px";

                    } else {

                        var wrap = document.createElement('div');

                        wrap.className = 'table-scroll';

                        wrap.style.maxHeight = availH + 'px';

                        table.parentElement.insertBefore(wrap, table);

                        wrap.appendChild(table);

                    }

                }

            } else {

                var sx = 1, sy = 1;

                if (con.scrollWidth > maxW) sx = maxW / con.scrollWidth;

                if (con.scrollHeight > maxH) sy = maxH / con.scrollHeight;

                var s = Math.min(sx, sy, 1);

                if (s < 1) {

                    con.style.transformOrigin = "${to} top";

                    con.style.transform = "scale(" + s + ")";

                    con.style.width = (maxW / s) + "px";

                }

            }

        }

        document.addEventListener('keydown', function(e) {

            if (e.key === 'f' && !e.ctrlKey && !e.metaKey && !e.shiftKey && !e.altKey) {

                if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); }

                else { document.exitFullscreen(); }

            }

            if (e.key === 'Escape') closeLightbox();

        });

        document.addEventListener('click', function(e) {

            var target = e.target.closest('.slide-content img, .slide-bg');

            if (!target) return;

            e.preventDefault();

            e.stopPropagation();

            var src = target.tagName === 'IMG' ? target.src

                : target.style.backgroundImage.replace(/^url\(["']?|["']?\)$/g, '');

            var lb = document.getElementById('img-lightbox');

            var li = document.getElementById('lightbox-img');

            if (lb && li && src) {

                li.src = src;

                li.alt = target.alt || '';

                lb.classList.add('open');

            }

        });

        function closeLightbox() {

            var lb = document.getElementById('img-lightbox');

            if (lb) lb.classList.remove('open');

        }

        function renderCharts() {

            var boxes = document.querySelectorAll('.chart-box[data-chart]');

            boxes.forEach(function(box) {

                if (box._rendered) return;

                try {

                    var cfg = JSON.parse(box.getAttribute('data-chart').replace(/&apos;/g, "'"));

                    var canvas = box.querySelector('canvas');

                    if (!canvas) return;



                    var datasets = cfg.datasets;

                    if (cfg.type === 'bar' && cfg.horizontal) {
                        datasets.forEach(ds => { ds.xAxisID = 'x'; ds.yAxisID = 'y'; });
                    }

                    var chartType = cfg.type === 'doughnut' ? 'doughnut' : cfg.type === 'pie' ? 'pie' : cfg.type === 'polarArea' ? 'polarArea' : cfg.type === 'radar' ? 'radar' : cfg.horizontal ? 'bar' : cfg.type;

                    var opts = {
                        responsive: true,
                        maintainAspectRatio: !cfg.height,
                        aspectRatio: cfg.aspectRatio || 2,
                        animation: false,
                        plugins: {
                            legend: { display: cfg.showLegend !== false },
                            title: cfg.title ? { display: true, text: cfg.title } : undefined
                        },
                        indexAxis: cfg.horizontal ? 'y' : undefined
                    };



                    if (cfg.url) {

                        fetch(cfg.url).then(res => res.text()).then(text => {

                            let fetchLabels = [];

                            let fetchDatasets = [];

                            try {

                                const json = JSON.parse(text);

                                if (Array.isArray(json) && json.length > 0) {

                                    const keys = Object.keys(json[0]);

                                    fetchLabels = json.map(row => row[keys[0]]);

                                    for (let i = 1; i < keys.length; i++) {

                                        fetchDatasets.push({

                                            label: keys[i],

                                            data: json.map(row => Number(row[keys[i]]) || 0)

                                        });

                                    }

                                }

                            } catch (e) {

                                const lines = text.split('\\n').filter(l => l.trim());

                                if (lines.length >= 2) {

                                    const sep = text.includes(';') ? ';' : ',';

                                    const headers = lines[0].split(sep).map(h => h.trim());

                                    const dataRows = lines.slice(1).map(l => l.split(sep).map(c => c.trim()));

                                    fetchLabels = dataRows.map(r => r[0] || '');

                                    for (let i = 1; i < headers.length; i++) {

                                        fetchDatasets.push({

                                            label: headers[i],

                                            data: dataRows.map(r => Number(r[i]) || 0)

                                        });

                                    }

                                }

                            }

                            

                            new Chart(canvas, { type: chartType, data: { labels: fetchLabels, datasets: fetchDatasets }, options: opts });

                            setTimeout(adj, 100);

                        }).catch(e => console.error('Fetch error:', e));

                    } else {

                        new Chart(canvas, { type: chartType, data: { labels: cfg.labels, datasets: datasets }, options: opts });

                        setTimeout(adj, 100);

                    }



                    box._rendered = true;

                } catch(e) { console.error('Chart render error:', e); }

            });

        }

        function hexToRgba(hex, opacity) {

            var r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);

            return 'rgba(' + r + ',' + g + ',' + b + ',' + opacity + ')';

        }

        Reveal.on("ready", function() { adj(); renderCharts(); }); Reveal.on("slidechanged", function() { adj(); renderCharts(); });

    <\/script>

</body>

</html>`;

            return html;

        }



        function escHtml(str) {

            const d = document.createElement('div');

            d.textContent = str;

            return d.innerHTML;

        }



        // ============ COMPONENTS ============



        function Header() {

            const ctx = useContext(AppContext);

            const { slides, currentIndex, theme, setTheme, config, setConfig, previewSlides, showFullscreenPreview, downloadHTML, downloadPDF, downloadMD, copyToClipboard, downloadTXT, downloadCSV, downloadTSV, openConfig, setSlidesFromFull, parseAndLoadPresentation, resetDocument } = ctx;

            const [themeOpen, setThemeOpen] = useState(false);

            const [exportOpen, setExportOpen] = useState(false);

            const [importOpen, setImportOpen] = useState(false);

            const [shortcutsOpen, setShortcutsOpen] = useState(false);

            const themeRef = useRef(null);

            const exportRef = useRef(null);

            const importRef = useRef(null);

            const shortcutsRef = useRef(null);

            const importFileRef = useRef(null);



            useEffect(() => {

                function handleClick(e) {

                    if (themeRef.current && !themeRef.current.contains(e.target)) setThemeOpen(false);

                    if (exportRef.current && !exportRef.current.contains(e.target)) setExportOpen(false);

                    if (importRef.current && !importRef.current.contains(e.target)) setImportOpen(false);

                    if (shortcutsRef.current && !shortcutsRef.current.contains(e.target)) setShortcutsOpen(false);

                }

                document.addEventListener('mousedown', handleClick);

                return () => document.removeEventListener('mousedown', handleClick);

            }, []);



            const currentTheme = THEMES.find(t => t.id === theme);



            return (

                <header className="flex items-center justify-between border-b border-zinc-200 bg-white px-4 py-2 shrink-0">

                    <div className="flex items-center gap-4">

                        <h1 className="text-lg font-semibold text-zinc-900 tracking-tight flex items-center gap-2">

                            <Icon name="presentation" className="w-5 h-5 text-blue-600" />

                            ANAC Slides

                        </h1>

                        <span className="text-sm font-medium text-zinc-500 bg-zinc-100 px-2 py-1 rounded-md">

                        </span>

                    </div>



                    <div className="flex items-center gap-2">

                        <button
                            className="flex items-center gap-2 px-3 py-1.5 text-sm font-medium border border-zinc-200 rounded-md hover:bg-zinc-100"
                            onClick={resetDocument}
                            title="Novo Documento"
                        >
                            <Icon name="file-plus" className="w-4 h-4" />
                            <span className="hidden sm:inline">Novo</span>
                        </button>

                        <button

                            className="flex items-center gap-2 px-3 py-1.5 text-sm font-medium border border-zinc-200 rounded-md hover:bg-zinc-100"

                            onClick={openConfig}

                            title="Configuracoes ANAC"

                        >

                            <Icon name="settings" className="w-4 h-4" />

                            <span className="hidden sm:inline">Metadados</span>

                        </button>



                        <div className="relative" ref={themeRef}>

                            <button
                                className="flex items-center gap-2 px-3 py-1.5 text-sm font-medium border border-zinc-200 rounded-md hover:bg-zinc-100"
                                onClick={() => { setThemeOpen(!themeOpen); setExportOpen(false); }}
                                title="Temas"
                            >

                                <div className="w-3 h-3 rounded-full border border-zinc-300 shadow-inner" style={{ backgroundColor: currentTheme?.color, boxShadow: 'inset 0 1px 3px rgba(0,0,0,0.15)' }}></div>

                                <Icon name="palette" className="w-4 h-4" />

                            </button>

                            <div className={`dropdown-content ${themeOpen ? 'open' : ''}`} style={{ right: 0 }}>

                                <div className="px-2 py-1.5 text-xs font-semibold text-zinc-500">Tema da Apresentação</div>

                                <hr className="my-1 border-zinc-200" />

                                {THEMES.map(t => (

                                    <a key={t.id} className="dropdown-item" onClick={() => { setTheme(t.id); setConfig(prev => ({ ...prev, coverImg: t.defaultCover || '', closeImg: t.defaultClose || '' })); setThemeOpen(false); }}>

                                        <div className="w-3 h-3 rounded-full border border-zinc-300 shadow-inner" style={{ backgroundColor: t.color, boxShadow: 'inset 0 1px 3px rgba(0,0,0,0.15)' }}></div>

                                        {t.name}

                                    </a>

                                ))}

                            </div>

                        </div>



                        <button

                            className="flex items-center gap-2 px-3 py-1.5 text-sm font-medium border border-zinc-200 rounded-md hover:bg-zinc-100"

                            onClick={ctx.loadChartDemos}

                            title="Slides de demonstração"

                        >

                            <Icon name="bar-chart-2" className="w-4 h-4" />

                            <span className="hidden sm:inline">Demos</span>

                        <button

                        >

                        </button>

                        <button
                            className="flex items-center justify-center w-8 h-8 rounded-md hover:bg-zinc-100 text-zinc-700"
                            onClick={previewSlides}
                            title="Visualizar (Nova Aba)"
                        >
                            <Icon name="play" className="w-4 h-4" />
                        </button>



                        {/* Shortcuts */}

                        <div className="relative" ref={shortcutsRef}>

                            <button

                                className="flex items-center justify-center w-8 h-8 rounded-md hover:bg-zinc-100 text-zinc-700"

                                onClick={() => { setShortcutsOpen(!shortcutsOpen); setThemeOpen(false); setExportOpen(false); setImportOpen(false); }}

                                title="Atalhos do Teclado"

                            >

                                <Icon name="keyboard" className="w-4 h-4" />

                            </button>

                            <div className={`shortcuts-popup ${shortcutsOpen ? 'open' : ''}`}>

                                <div className="shortcuts-header">Atalhos do Teclado</div>

                                <div className="shortcuts-body">

                                    <div className="shortcuts-section">

                                        <div className="shortcuts-section-title">Formatação</div>

                                        <div className="shortcut-row"><kbd>Ctrl+B</kbd><span>Negrito</span></div>

                                        <div className="shortcut-row"><kbd>Ctrl+I</kbd><span>Itálico</span></div>

                                        <div className="shortcut-row"><kbd>Ctrl+U</kbd><span>Sublinhado</span></div>

                                    </div>

                                        <div className="shortcut-row"><kbd>Tab</kbd><span>Avançar campo</span></div>

                                        <div className="shortcut-row"><kbd>Shift+Tab</kbd><span>Voltar campo</span></div>

                                    </div>

                                    <div className="shortcuts-section">

                                        <div className="shortcuts-section-title">Slides</div>

                                        <div className="shortcut-row"><kbd>---</kbd><span>Separador de slides</span></div>

                                        <div className="shortcut-row"><kbd>Alt+S</kbd><span>Visualizar</span></div>

                                    </div>

                                        <div className="shortcuts-section-title">Apresentação</div>

                                        <div className="shortcut-row"><kbd>Alt+Click</kbd><span>Zoom</span></div>

                                        <div className="shortcut-row"><kbd>Ctrl+Shift+F</kbd><span>Buscar</span></div>

                                        <div className="shortcut-row"><kbd>F</kbd><span>Tela cheia</span></div>

                                        <div className="shortcut-row"><kbd>S</kbd><span>Notas do Orador</span></div>

                        {/* Export Dropdown */}

                                    <Icon name="file-text" className="w-4 h-4" /> Exportar MD (Markdown)
